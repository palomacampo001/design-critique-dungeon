<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>IBM One Madison Wayfinder</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --b:#0f62fe;--bh:#0043ce;--bl:#edf5ff;
  --g0:#161616;--g1:#262626;--g2:#393939;--g3:#525252;
  --g4:#6f6f6f;--g5:#c6c6c6;--g6:#e0e0e0;--g7:#f4f4f4;
  --wh:#fff;--grn:#42be65;--red:#fa4d56;
  --fnt:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --mono:"SFMono-Regular",Consolas,Menlo,monospace;
  --top:52px;--bot:64px;
}
html,body{height:100%;width:100%;overflow:hidden;font-family:var(--fnt);font-size:14px;color:var(--g0);background:#12172a}
#app{position:relative;width:100%;height:100dvh;overflow:hidden}

/* TOP BAR */
#tb{position:absolute;top:0;left:0;right:0;height:var(--top);
  background:var(--g0);display:flex;align-items:center;
  padding:0 16px;gap:10px;z-index:200}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-bars{display:flex;flex-direction:column;gap:2px;width:26px}
.logo-bars span{display:block;height:2px;background:#1192e8;border-radius:1px}
.logo-bars span:nth-child(3),.logo-bars span:nth-child(4){width:70%}
.bname{font-size:13px;font-weight:500;color:#fff;white-space:nowrap}
.bname em{color:#4589ff;font-style:normal}
.sp{flex:1}
.ib{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;border-radius:4px;color:var(--g5)}
.ib:active{background:var(--g2)}

/* MAP */
#mw{position:absolute;top:var(--top);bottom:var(--bot);left:0;right:0;
  overflow:hidden;touch-action:none;cursor:grab;background:#12172a}
#mw.gr{cursor:grabbing}
#mc{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#mc canvas{display:block}
#pl{position:absolute;top:0;left:0;pointer-events:none}

/* SEARCH — floats over map, top */
#sb{position:absolute;top:calc(var(--top)+12px);left:12px;right:66px;z-index:300}
.sw{background:#fff;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.4);
  display:flex;align-items:center;padding:0 12px;height:48px;gap:8px;
  border:2px solid transparent;transition:border-color .15s}
.sw:focus-within{border-color:var(--b)}
.sw input{flex:1;border:none;outline:none;font:15px var(--fnt);color:var(--g0);background:transparent}
.sw input::placeholder{color:var(--g4)}
.sx{border:none;background:none;cursor:pointer;color:var(--g4);
  width:28px;height:28px;display:none;align-items:center;justify-content:center}
.sx.v{display:flex}
#sr{background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.3);
  margin-top:6px;display:none;max-height:260px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#sr.v{display:block}
.sri{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer;
  border-bottom:1px solid var(--g6)}
.sri:last-child{border-bottom:none}
.sri:active{background:var(--bl)}
.sic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sn{font-size:13px;font-weight:500;color:var(--g0)}
.sd{font-size:11px;color:var(--g4);margin-top:1px}
.sf{font-size:10px;font-weight:600;padding:2px 6px;border-radius:12px;flex-shrink:0;font-family:var(--mono)}

/* RIGHT SIDEBAR — floor pill on top, zoom below, both right-aligned */
#right-side{position:absolute;right:12px;top:calc(var(--top)+12px);
  display:flex;flex-direction:column;align-items:center;gap:10px;z-index:300}

/* FLOOR PILL */
#fp{background:#fff;border-radius:24px;box-shadow:0 4px 16px rgba(0,0,0,.3);
  overflow:hidden;border:1px solid var(--g6);flex-shrink:0}
.fb{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;
  font-family:var(--mono);font-size:13px;font-weight:600;color:var(--g3);
  border-bottom:1px solid var(--g6);transition:background .12s,color .12s}
.fb:last-child{border-bottom:none}
.fb.a{background:var(--b);color:#fff}
.fb:active:not(.a){background:var(--bl);color:var(--b)}

/* ZOOM CONTROLS */
#zc{background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.3);
  overflow:hidden;border:1px solid var(--g6);flex-shrink:0}
.mb{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;color:var(--g3);font-size:20px;
  border-bottom:1px solid var(--g6);user-select:none;transition:background .1s}
.mb:last-child{border-bottom:none}
.mb:active{background:var(--g7)}

/* VIEW TOGGLE */
#vt{background:rgba(18,23,42,.85);border:1px solid rgba(255,255,255,.15);
  border-radius:6px;overflow:hidden;flex-shrink:0;backdrop-filter:blur(8px)}
.vb{width:44px;height:32px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;color:rgba(255,255,255,.5);
  font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.05em;
  border-bottom:1px solid rgba(255,255,255,.1);transition:background .12s,color .12s}
.vb:last-child{border-bottom:none}
.vb.a{background:var(--b);color:#fff}

/* ROUTE HEADER */
#rh{position:absolute;top:var(--top);left:0;right:0;background:#fff;z-index:300;
  padding:10px 44px 10px 12px;box-shadow:0 2px 8px rgba(0,0,0,.15);
  display:none;flex-direction:column;gap:7px}
#rh.v{display:flex}
.rf{display:flex;align-items:center;gap:8px;background:var(--g7);border-radius:4px;
  padding:8px 12px;font-size:13px;color:var(--g2)}
.rfd{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rf span{flex:1}
#rx{position:absolute;top:10px;right:10px;border:none;background:none;cursor:pointer;color:var(--g4);padding:6px}

/* BOTTOM SHEET */
#bs{position:absolute;bottom:var(--bot);left:0;right:0;background:#fff;
  border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.25);z-index:400;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:62vh;display:flex;flex-direction:column;overflow:hidden}
#bs.on{transform:translateY(0)}
#bs.pk{transform:translateY(calc(100% - 130px))}
.bh{width:36px;height:4px;background:var(--g5);border-radius:2px;margin:10px auto 0;flex-shrink:0;cursor:pointer}
#bb{padding:16px 20px 28px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.bt{font-size:18px;font-weight:600;margin-bottom:4px}
.bs2{font-size:12px;color:var(--g4);margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px}
.ba{display:flex;gap:8px;margin-bottom:14px}
.bb2{flex:1;height:40px;border:none;border-radius:4px;font:500 13px var(--fnt);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px}
.bb2.p{background:var(--b);color:#fff}.bb2.p:active{background:var(--bh)}
.bb2.s{background:var(--g7);color:var(--g2);border:1px solid var(--g6)}.bb2.s:active{background:var(--g6)}
.br{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--g6);font-size:13px;color:var(--g3)}
.rbox{background:var(--bl);border-radius:8px;padding:12px 14px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between}
.rt{font-size:22px;font-weight:600;color:var(--bh)}
.rd{font-size:12px;color:var(--g3);margin-top:2px}
.stp{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--g6);font-size:13px;color:var(--g2)}
.stpi{width:26px;height:26px;border-radius:50%;background:var(--g7);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* BOTTOM NAV */
#bn{position:absolute;bottom:0;left:0;right:0;height:var(--bot);
  background:var(--g0);display:flex;align-items:center;z-index:200;
  padding-bottom:env(safe-area-inset-bottom,0px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;height:100%;border:none;background:none;cursor:pointer;
  color:var(--g4);font-size:10px;font-family:var(--fnt);transition:color .15s}
.ni.a{color:#4589ff}
.ni svg{width:22px;height:22px}

/* TOAST */
#t{position:absolute;bottom:calc(var(--bot)+14px);left:50%;
  transform:translateX(-50%) translateY(50px);
  background:var(--g1);color:#fff;padding:9px 18px;border-radius:8px;
  font-size:13px;white-space:nowrap;z-index:600;
  transition:transform .25s,opacity .25s;pointer-events:none;opacity:0}
#t.on{transform:translateX(-50%) translateY(0);opacity:1}

/* ISO LABELS */
.iso-lbl{position:absolute;pointer-events:none;z-index:8;
  font:700 11px var(--mono);white-space:nowrap;
  text-shadow:0 1px 3px rgba(0,0,0,.8)}
</style>
</head>
<body>

</header>

<div id="mw">

    <canvas id="cv"></canvas>
    <svg id="rv" style="position:absolute;top:0;left:0;overflow:visible;pointer-events:none">
      <defs><marker id="ar" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <path d="M0,0L6,3L0,6Z" fill="#0f62fe"/></marker></defs>
    </svg>
    <div id="pl"></div>
  </div>
</div>

<!-- RIGHT SIDEBAR: search gap | floor pill | zoom | view toggle -->
<div id="sb">
  <div class="sw">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#6f6f6f">
      <path d="M15.7 14.3l-4.2-4.2A6 6 0 1 0 10.3 11.5l4.2 4.2-1.4 1.3zM6 10.5a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9z"/>
    </svg>
    <input id="si" type="search" placeholder="Search rooms, amenities&#8230;" autocomplete="off" autocorrect="off" autocapitalize="off"/>
    <button class="sx" id="sx" aria-label="Clear">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M12 4.7L11.3 4 8 7.3 4.7 4 4 4.7 7.3 8 4 11.3l.7.7L8 8.7l3.3 3.3.7-.7L8.7 8z"/></svg>
    </button>
  </div>
  <div id="sr"></div>
</div>

<div id="right-side">
  <!-- Floor pill -->
  <div id="fp"></div>
  <!-- Zoom controls -->
  <div id="zc">
    <button class="mb" id="zi">+</button>
    <button class="mb" id="zo">&#8722;</button>
    <button class="mb" id="zr">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 12.5A5.5 5.5 0 1 1 8 2.5a5.5 5.5 0 0 1 0 11zM8 6a2 2 0 1 0 0 4A2 2 0 0 0 8 6z"/></svg>
    </button>
  </div>
  <!-- ISO/Flat view toggle -->
  <div id="vt">
    <button class="vb a" id="v-iso">ISO</button>
    <button class="vb" id="v-flat">FLAT</button>
  </div>
</div>

<div id="rh">
  <div class="rf"><div class="rfd" style="background:#42be65"></div><span id="rfa">Your location</span></div>
  <div class="rf"><div class="rfd" style="background:#fa4d56"></div><span id="rfb">Destination</span></div>
  <button id="rx"><svg width="16" height="16" viewBox="0 0 16 16" fill="#6f6f6f"><path d="M12 4.7L11.3 4 8 7.3 4.7 4 4 4.7 7.3 8 4 11.3l.7.7L8 8.7l3.3 3.3.7-.7L8.7 8z"/></svg></button>
</div>

<div id="bs">
  <div class="bh" id="bh"></div>
  <div id="bb"></div>
</div>

<nav id="bn">
  <button class="ni a" id="n0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3,6 9,3 15,6 21,3 21,18 15,21 9,18 3,21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>Map</button>
  <button class="ni" id="n1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Explore</button>
  <button class="ni" id="n2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3,11 22,2 13,21 11,13"/></svg>Directions</button>
  <button class="ni" id="n3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>Saved</button>
</nav>

<div id="t"></div>

// SVG coord space
const SVG_W=1224, SVG_H=792;
// Draw scale: fit 1224 wide into ~700px
const DS=0.57;
const CW=Math.round(SVG_W*DS); // ~698
const CH=Math.round(SVG_H*DS); // ~452

// ISO constants
const ISO_SX=0.50;  // horizontal skew per Y unit
const ISO_SY=0.25;  // vertical compression
const GAP=90;       // px between stacked floors

// Total canvas size: wide enough for iso projection
const ISO_EXTRA_W=Math.round(SVG_H*DS*ISO_SX*0.5);
const ISO_EXTRA_H=Math.round(FL.length*GAP + SVG_W*DS*ISO_SY);
const TOTAL_W = view==='iso' ? CW+ISO_EXTRA_W+60 : CW;
const TOTAL_H_ISO = CH + FL.length*GAP + 80;

function setCanvasSize(){
  if(view==='iso'){
    cv.width=CW+120; cv.height=TOTAL_H_ISO;
    cv.style.width=(CW+120)+'px'; cv.style.height=TOTAL_H_ISO+'px';
    rv.setAttribute('width',CW+120); rv.setAttribute('height',TOTAL_H_ISO);
    pl.style.width=(CW+120)+'px'; pl.style.height=TOTAL_H_ISO+'px';
  } else {
    cv.width=CW; cv.height=CH;
    cv.style.width=CW+'px'; cv.style.height=CH+'px';
    rv.setAttribute('width',CW); rv.setAttribute('height',CH);
    pl.style.width=CW+'px'; pl.style.height=CH+'px';
  }
}

// Convert SVG coords to screen coords for a given floor index
function isoXY(svgX, svgY, floorIdx){
  // Each floor is lifted by GAP * (FL.length-1-floorIdx) so floor 0 is at bottom
  const lift = (FL.length-1-floorIdx)*GAP;
  // Apply shear: x goes right, y adds rightward shift
  const sx = svgX*DS - svgY*DS*ISO_SX*0.5 + 40;
  const sy = svgX*DS*ISO_SY*0.5 + svgY*DS*ISO_SY + lift + 30;
  return {x:sx, y:sy};
}

function flatXY(svgX, svgY){
  return {x: svgX*DS, y: svgY*DS};
}

function proj(svgX, svgY, floorIdx){
  return view==='iso' ? isoXY(svgX,svgY,floorIdx) : flatXY(svgX,svgY);
}

// ── ROUNDED RECT (iOS 15 compat) ──────────────────────
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── DRAW ISO FLOOR ────────────────────────────────────
function drawIsoFloor(sh, floorIdx, floorColor, isActive){
  // Draw the floor as a skewed parallelogram
  const walls = sh.walls;
  // Project each wall point
  const pts = walls.map(([x,y])=>isoXY(x,y,floorIdx));

  // Floor slab (bottom face — just a fill with the wall outline skewed)
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.closePath();
  ctx.fillStyle = isActive ? '#ffffff' : 'rgba(240,242,248,0.7)';
  ctx.fill();

  // Edge lines (give depth: draw left and front edges slightly darker)
  // Left edge shadow
  const p0=pts[0], pLast=pts[pts.length-1];
  ctx.beginPath();
  ctx.moveTo(p0.x, p0.y);
  ctx.lineTo(p0.x, p0.y+8);
  ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=6;ctx.stroke();

  // Outline
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.closePath();
  ctx.strokeStyle = isActive ? floorColor : 'rgba(180,185,200,0.5)';
  ctx.lineWidth = isActive ? 2 : 1;
  ctx.stroke();

  // Zones (projected as skewed rects)
  if(sh.zones){
    sh.zones.forEach(z=>{
      const tl=isoXY(z.x,       z.y,       floorIdx);
      const tr=isoXY(z.x+z.w,   z.y,       floorIdx);
      const br=isoXY(z.x+z.w,   z.y+z.h,   floorIdx);
      const bl=isoXY(z.x,       z.y+z.h,   floorIdx);
      ctx.beginPath();
      ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);
      ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);
      ctx.closePath();
      const alpha = isActive ? 1 : 0.5;
      // Parse hex fill and apply alpha
      ctx.fillStyle = z.f || '#f4f4f4';
      ctx.globalAlpha = isActive ? 1 : 0.55;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle='rgba(0,0,0,.05)';ctx.lineWidth=.5;ctx.stroke();
    });
  }

  // Elevator shaft vertical lines (only if not bottom floor)
  if(isActive && floorIdx < FL.length-1){
    const shaftPts=[{x:497,y:330},{x:670,y:315}];
    shaftPts.forEach(sp=>{
      const top=isoXY(sp.x,sp.y,floorIdx);
      const bot=isoXY(sp.x,sp.y,floorIdx+1);
      // Gradient shaft
      const grad=ctx.createLinearGradient(top.x,top.y,bot.x,bot.y);
      grad.addColorStop(0,'rgba(8,189,186,.7)');
      grad.addColorStop(1,'rgba(8,189,186,.15)');
      ctx.beginPath();
      ctx.moveTo(top.x-3,top.y);ctx.lineTo(top.x+3,top.y);
      ctx.lineTo(bot.x+3,bot.y);ctx.lineTo(bot.x-3,bot.y);
      ctx.closePath();
      ctx.fillStyle=grad;ctx.fill();
      ctx.strokeStyle='rgba(8,189,186,.5)';ctx.lineWidth=1;ctx.stroke();
    });
  }
}

// ── DRAW FLAT FLOOR ───────────────────────────────────
function drawFlatFloor(sh, floorColor){
  const walls=sh.walls;
  ctx.beginPath();
  walls.forEach(([x,y],i)=>i===0?ctx.moveTo(x*DS,y*DS):ctx.lineTo(x*DS,y*DS));
  ctx.closePath();
  ctx.fillStyle='#ffffff';ctx.fill();
  ctx.strokeStyle=floorColor;ctx.lineWidth=2.5;ctx.stroke();

  if(sh.zones){
    sh.zones.forEach(z=>{
      rrect(z.x*DS,z.y*DS,z.w*DS,z.h*DS,3);
      ctx.fillStyle=z.f||'#f4f4f4';ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=1;ctx.stroke();
      const cw=z.w*DS,ch=z.h*DS;
      if(cw>28&&ch>16){
        const fs=Math.min(9,Math.max(6,cw/(z.l.length*0.72)));
        ctx.fillStyle='#525252';ctx.font=fs+'px -apple-system,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(z.l,z.x*DS+cw/2,z.y*DS+ch/2,cw-4);
      }
    });
  }

  // Scale bar
  ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(CW-60,CH-12);ctx.lineTo(CW-14,CH-12);ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.font='8px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText('~20m',CW-37,CH-2);
}

// ── MAIN RENDER ───────────────────────────────────────
function render(){
  setCanvasSize();
  ctx.clearRect(0,0,cv.width,cv.height);
  // Remove old labels
  document.querySelectorAll('.iso-lbl').forEach(e=>e.remove());

  if(view==='iso'){
    // Dark background gradient
    const bg=ctx.createLinearGradient(0,0,0,cv.height);
    bg.addColorStop(0,'#1a2035');bg.addColorStop(1,'#0d1020');
    ctx.fillStyle=bg;ctx.fillRect(0,0,cv.width,cv.height);

    // Draw floors bottom to top (index 0 = Floor 1 = bottom of stack)
    FL.forEach((f,i)=>{
      const sh=SHAPES[f.n];
      if(!sh)return;
      const isActive=(i===fi);
      drawIsoFloor(sh,i,f.c,isActive);
    });

    // Floor labels on left spine
    FL.forEach((f,i)=>{
      const p=isoXY(0, SVG_H/2, i);
      const lbl=document.createElement('div');
      lbl.className='iso-lbl';
      lbl.style.left=(p.x-42)+'px';
      lbl.style.top=(p.y-8)+'px';
      lbl.style.color= i===fi ? f.c : 'rgba(180,190,210,0.5)';
      lbl.style.borderLeft=`3px solid ${i===fi?f.c:'rgba(180,190,210,0.3)'}`;
      lbl.style.paddingLeft='6px';
      lbl.textContent=f.name;
      mcEl.appendChild(lbl);
    });

  } else {
    // Flat: light bg
    ctx.fillStyle='#e8eef4';ctx.fillRect(0,0,CW,CH);
    const f=FL[fi],sh=SHAPES[f.n];
    if(sh) drawFlatFloor(sh,f.c);
    // Floor label
    ctx.fillStyle=f.c;ctx.font='bold 11px monospace';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(f.name,8,6);
  }

  renderPins();
  drawRoute();
}

// ── PINS ─────────────────────────────────────────────
function renderPins(){
  pl.innerHTML='';
  const f=FL[fi];

    d.dataset.id=p.id;
    d.innerHTML=`<svg width="20" height="26" viewBox="0 0 28 36"><path d="M14 0C6.27 0 0 6.27 0 14c0 9.94 14 22 14 22S28 23.94 28 14C28 6.27 21.73 0 14 0z" fill="${ic.c}"/><circle cx="14" cy="14" r="7" fill="white" opacity=".9"/><svg x="7" y="7" width="14" height="14" viewBox="0 0 16 16" fill="${ic.c}">${ic.p}</svg></svg>`;
    d.addEventListener('click',e=>{e.stopPropagation();if(rmode&&rstep)assignRoute(p);else showPOI(p);},{passive:true});
    pl.appendChild(d);
  });

  yah.style.cssText=`position:absolute;left:${yahPt.x}px;top:${yahPt.y}px;transform:translate(-50%,-50%);pointer-events:none;z-index:4`;
  yah.innerHTML=`<svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="8" fill="#0f62fe" opacity=".2"/><circle cx="9" cy="9" r="5" fill="#0f62fe" opacity=".4"/><circle cx="9" cy="9" r="3" fill="#0f62fe"/><circle cx="9" cy="9" r="1.5" fill="white"/></svg>`;
  pl.appendChild(yah);
}

function addNavPin(svgX,svgY,color){
  const pt=proj(svgX,svgY,fi);
  const d=document.createElement('div');
  d.style.cssText=`position:absolute;left:${pt.x}px;top:${pt.y}px;transform:translate(-50%,-100%);pointer-events:none;z-index:10;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))`;
  d.innerHTML=`<svg width="24" height="32" viewBox="0 0 28 36"><path d="M14 0C6.27 0 0 6.27 0 14c0 9.94 14 22 14 22S28 23.94 28 14C28 6.27 21.73 0 14 0z" fill="${color}"/><circle cx="14" cy="14" r="5" fill="white"/></svg>`;
  pl.appendChild(d);
}

// ── ROUTE ─────────────────────────────────────────────
function drawRoute(){
  rv.querySelectorAll('.rp').forEach(e=>e.remove());
  if(!org||!dst) return;
  const o=proj(org.svgX,org.svgY,fi);
  const d2=proj(dst.svgX,dst.svgY,fi);
  const m=proj(dst.svgX,org.svgY,fi);
  const pathD=`M${o.x},${o.y}L${m.x},${m.y}L${d2.x},${d2.y}`;
  const mk=(w,c,dash,marker)=>{
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',pathD);p.setAttribute('class','rp');p.setAttribute('fill','none');
    p.setAttribute('stroke',c);p.setAttribute('stroke-width',w);p.setAttribute('stroke-linecap','round');
    if(dash)p.setAttribute('stroke-dasharray',dash);
    if(marker)p.setAttribute('marker-end',marker);
    rv.appendChild(p);
  };
  mk('8','rgba(0,0,0,.2)');
  mk('4','#0f62fe','10 4','url(#ar)');
}

// ── PAN / ZOOM ────────────────────────────────────────
function applyT(a){
  if(a){mcEl.style.transition='transform .28s cubic-bezier(.4,0,.2,1)';setTimeout(()=>mcEl.style.transition='',300);}
  mcEl.style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;
}
function center(a=true){
  const vw=mw.clientWidth,vh=mw.clientHeight;
  const cw=cv.width,ch=cv.height;
  const fit=Math.min(vw/cw,vh/ch)*0.85;
  sc=Math.max(.15,Math.min(4,fit));
  ox=(vw-cw*sc)/2; oy=(vh-ch*sc)/2;
  applyT(a);
}
function zAt(cx,cy,f){
  const ns=Math.max(.15,Math.min(4,sc*f)),r=ns/sc;
  ox=cx-(cx-ox)*r;oy=cy-(cy-oy)*r;sc=ns;applyT(false);
}

let tx=0,ty=0,td=false,pd=0,px2=0,py2=0,mm=0;
mw.addEventListener('touchstart',e=>{
  if(e.touches.length===1){tx=e.touches[0].clientX;ty=e.touches[0].clientY;td=true;mm=0;}
  else if(e.touches.length===2){
    pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const r=mw.getBoundingClientRect();
    px2=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
    py2=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
    td=false;
  }
},{passive:false});
mw.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&td){
    const dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;
    mm+=Math.abs(dx)+Math.abs(dy);ox+=dx;oy+=dy;
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;applyT(false);
  }else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zAt(px2,py2,d/pd);pd=d;
  }
},{passive:false});
mw.addEventListener('touchend',()=>{td=false;},{passive:true});
let md=false,mvm=0;
mw.addEventListener('mousedown',e=>{if(e.button!==0)return;md=true;mvm=0;mw.classList.add('gr');});
mw.addEventListener('mousemove',e=>{if(!md)return;mvm+=Math.abs(e.movementX)+Math.abs(e.movementY);ox+=e.movementX;oy+=e.movementY;applyT(false);});
mw.addEventListener('mouseup',()=>{md=false;mw.classList.remove('gr');});
mw.addEventListener('mouseleave',()=>{md=false;mw.classList.remove('gr');});
mw.addEventListener('wheel',e=>{e.preventDefault();const r=mw.getBoundingClientRect();zAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12);},{passive:false});
mw.addEventListener('click',e=>{if(mvm>6)return;if(!rmode)hideBs();});
document.getElementById('zi').onclick=()=>zAt(mw.clientWidth/2,mw.clientHeight/2,1.35);
document.getElementById('zo').onclick=()=>zAt(mw.clientWidth/2,mw.clientHeight/2,1/1.35);
document.getElementById('zr').onclick=()=>center();

// ── VIEW TOGGLE ───────────────────────────────────────
document.getElementById('v-iso').onclick=()=>{
  view='iso';
  document.getElementById('v-iso').classList.add('a');
  document.getElementById('v-flat').classList.remove('a');

document.getElementById('v-flat').onclick=()=>{

};

// ── FLOOR PILL ────────────────────────────────────────
function buildPill(){
  const fp=document.getElementById('fp');fp.innerHTML='';
  [...FL].reverse().forEach(f=>{
    const i=FL.findIndex(x=>x.n===f.n);
    const b=document.createElement('button');
    b.className='fb'+(i===fi?' a':'');
    b.textContent=f.n;b.title=f.name;
    b.onclick=()=>switchFloor(i);
    fp.appendChild(b);
  });
}
function switchFloor(i){
  fi=i;buildPill();render();showToast(FL[i].name);hideBs();org=null;dst=null;
}

// ── SEARCH ────────────────────────────────────────────
function allP(){return FL.flatMap((f,i)=>(FP[f.n]||{pois:[]}).pois.map(p=>({...p,fi:i,fn:f.name,fc:f.c,fl:f.n})));}
const sinp=document.getElementById('si'),sxb=document.getElementById('sx'),srEl=document.getElementById('sr');
sinp.oninput=()=>{
  const q=sinp.value.trim().toLowerCase();
  sxb.classList.toggle('v',q.length>0);
  if(!q){srEl.classList.remove('v');return;}
  renderSR(allP().filter(p=>p.label.toLowerCase().includes(q)||(p.desc||'').toLowerCase().includes(q)),q);
};
sinp.onfocus=()=>{if(sinp.value.trim())srEl.classList.add('v');};
document.addEventListener('click',e=>{if(!document.getElementById('sb').contains(e.target))srEl.classList.remove('v');});
sxb.onclick=()=>{sinp.value='';sxb.classList.remove('v');srEl.classList.remove('v');sinp.focus();};
function renderSR(items,q){
  if(!items.length){srEl.innerHTML=`<div class="sri"><span class="sn" style="color:#6f6f6f">No results</span></div>`;srEl.classList.add('v');return;}
  srEl.innerHTML=items.slice(0,8).map(p=>{
    const ic=IC[p.type]||IC.room,lbl=(p.label||'').replace(/&amp;/g,'&');
    return `<div class="sri" data-id="${p.id}" data-fi="${p.fi}"><div class="sic" style="background:${ic.c}18;color:${ic.c}"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">${ic.p}</svg></div><div style="flex:1"><div class="sn">${hl(lbl,q)}</div><div class="sd">${p.fn}</div></div><span class="sf" style="background:${p.fc}18;color:${p.fc}">${p.fl}</span></div>`;
  }).join('');
  srEl.classList.add('v');
  srEl.querySelectorAll('[data-id]').forEach(el=>{el.onclick=()=>{
    const i=parseInt(el.dataset.fi);const poi=(FP[FL[i].n]||{pois:[]}).pois.find(p=>p.id===el.dataset.id);
    if(!poi)return;srEl.classList.remove('v');sinp.value=(poi.label||'').replace(/&amp;/g,'&');
    if(i!==fi)switchFloor(i);flyTo(poi.x,poi.y);showPOI(poi);
  };});
}
function hl(t,q){const i=t.toLowerCase().indexOf(q);if(i<0)return t;return t.slice(0,i)+`<b style="color:#0f62fe">${t.slice(i,i+q.length)}</b>`+t.slice(i+q.length);}
function flyTo(svgX,svgY){
  const pt=proj(svgX,svgY,fi);
  const vw=mw.clientWidth,vh=mw.clientHeight;
  sc=Math.min(4,Math.max(.15,2.2));
  ox=vw/2-pt.x*sc;oy=vh/2-pt.y*sc;applyT(true);
}

// ── POI SHEET ─────────────────────────────────────────

    <div class="ba">

      <button class="bb2 s" id="bsav"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>${sv?'Saved ✓':'Save'}</button>
    </div>

// ── ROUTING ───────────────────────────────────────────
function enterRoute(destPoi){
  rmode=true;document.getElementById('sb').style.display='none';document.getElementById('rh').classList.add('v');
  if(destPoi){const lbl=(destPoi.label||'').replace(/&amp;/g,'&');dst={svgX:destPoi.x,svgY:destPoi.y,fn:FL[fi].n,label:lbl};document.getElementById('rfb').textContent=lbl;rstep='org';toast('Tap your start point');}
  renderPins();navOn(2);
}
function exitRoute(){
  rmode=false;rstep=null;org=null;dst=null;
  rv.querySelectorAll('.rp').forEach(e=>e.remove());renderPins();
  document.getElementById('rh').classList.remove('v');document.getElementById('sb').style.display='';
  document.getElementById('rfa').textContent='Your location';document.getElementById('rfb').textContent='Destination';
  navOn(0);hideBs();
}
function assignRoute(poi){
  const lbl=(poi.label||'').replace(/&amp;/g,'&'),fn=FL[fi].n;
  if(rstep==='org'){org={svgX:poi.x,svgY:poi.y,fn,label:lbl};document.getElementById('rfa').textContent=lbl;rstep=dst?null:'dst';if(!dst)toast('Now tap destination');}
  else{dst={svgX:poi.x,svgY:poi.y,fn,label:lbl};document.getElementById('rfb').textContent=lbl;rstep=null;}
  renderPins();drawRoute();if(org&&dst)showRouteSheet();
}
function showRouteSheet(){
  const sf=org.fn===dst.fn;
  const dist=Math.round((Math.hypot(dst.svgX-org.svgX,dst.svgY-org.svgY)+(sf?0:120))*0.14);
  const mins=Math.max(1,Math.round(dist/85));
  const steps=sf?[`Walk toward ${dst.label}`,`Arrive at <b>${dst.label}</b>`]:
    [`Head to elevator on Floor ${org.fn}`,`Take elevator to Floor ${dst.fn}`,`Walk to <b>${dst.label}</b>`];
  document.getElementById('bb').innerHTML=`<div class="bt">Route</div>
    <div class="bs2"><span>${org.label}</span><span style="margin:0 5px">&#8594;</span><span>${dst.label}</span></div>
    <div class="rbox"><div><div class="rt">${mins} min</div><div class="rd">${dist} m walk</div></div>
      <button class="bb2 p" id="gon" style="flex:0;padding:0 16px">Start</button></div>
    ${steps.map((s,i)=>`<div class="stp"><div class="stpi" style="${i===steps.length-1?'color:#fa4d56':'color:#0f62fe'}"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${i===steps.length-1?'<circle cx="12" cy="12" r="8"/>':'<polygon points="3,11 22,2 13,21 11,13"/>'}</svg></div><span>${s}</span></div>`).join('')}`;
  document.getElementById('gon').onclick=()=>toast('Follow the blue path');
  showBs('pk');
}
document.getElementById('rx').onclick=exitRoute;

// ── EXPLORE / SAVED ───────────────────────────────────
function openExplore(){
  const groups={};allP().filter(p=>p.type!=='room').forEach(p=>{if(!groups[p.type])groups[p.type]=[];groups[p.type].push(p);});
  let h=`<div class="bt">Explore</div><div class="bs2">Tap to navigate</div>`;
  Object.keys(groups).sort().forEach(t=>{const ic=IC[t]||IC.room;h+=`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:${ic.c};margin:10px 0 5px;letter-spacing:.07em">${t}</div>${groups[t].slice(0,5).map(p=>{const lbl=(p.label||'').replace(/&amp;/g,'&');return`<div class="sri" data-eid="${p.id}" data-fi="${p.fi}" style="padding:9px 0;border-bottom:1px solid #e0e0e0"><div class="sic" style="background:${ic.c}18;color:${ic.c}"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">${ic.p}</svg></div><div style="flex:1"><div class="sn">${lbl}</div><div class="sd">${p.fn}</div></div><span class="sf" style="background:${p.fc}18;color:${p.fc}">${p.fl}</span></div>`;}).join('')}</div>`;});
  document.getElementById('bb').innerHTML=h;
  document.getElementById('bb').querySelectorAll('[data-eid]').forEach(el=>{el.onclick=()=>{const i=parseInt(el.dataset.fi);const poi=(FP[FL[i].n]||{pois:[]}).pois.find(p=>p.id===el.dataset.eid);if(!poi)return;if(i!==fi)switchFloor(i);flyTo(poi.x,poi.y);showPOI(poi);};});
  showBs('on');
}
function openSaved(){
  document.getElementById('bb').innerHTML=!saved.length?`<div class="bt">Saved Places</div><p style="padding:20px 0;text-align:center;color:#6f6f6f;font-size:13px">Tap bookmark on any location to save it.</p>`:
  `<div class="bt">Saved (${saved.length})</div>${saved.map((p,i)=>{const ic=IC[p.type]||IC.room,lbl=(p.label||'').replace(/&amp;/g,'&');return`<div class="sri" data-si="${i}" style="padding:10px 0;border-bottom:1px solid #e0e0e0"><div class="sic" style="background:${ic.c}18;color:${ic.c}"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">${ic.p}</svg></div><div style="flex:1"><div class="sn">${lbl}</div><div class="sd">${p.desc||''}</div></div></div>`;}).join('')}`;
  document.getElementById('bb').querySelectorAll('[data-si]').forEach(el=>{el.onclick=()=>showPOI(saved[parseInt(el.dataset.si)]);});
  showBs('on');
}

// ── HELPERS ────────────────────────────────────────────
function navOn(i){document.querySelectorAll('.ni').forEach((b,j)=>b.classList.toggle('a',j===i));}
function showBs(c){const b=document.getElementById('bs');b.classList.remove('on','pk');b.classList.add(c);}
function hideBs(){document.getElementById('bs').classList.remove('on','pk');}
document.getElementById('bh').onclick=hideBs;
document.getElementById('n0').onclick=()=>{navOn(0);hideBs();};
document.getElementById('n1').onclick=()=>{navOn(1);openExplore();};
document.getElementById('n2').onclick=()=>{navOn(2);enterRoute(null);};
document.getElementById('n3').onclick=()=>{navOn(3);openSaved();};
document.getElementById('stbtn').onclick=()=>toast('Settings — coming soon');
let tt;function toast(m){const el=document.getElementById('t');el.textContent=m;el.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('on'),2400);}

// ── BOOT ──────────────────────────────────────────────
buildPill();
render();
center(false);
</script>
</body>
</html>
