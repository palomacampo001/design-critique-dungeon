<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>IBM One Madison — Wayfinder</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --blue-60:#0043ce;--blue-50:#0f62fe;--blue-40:#4589ff;--blue-10:#edf5ff;
  --gray-100:#161616;--gray-90:#262626;--gray-80:#393939;--gray-70:#525252;
  --gray-60:#6f6f6f;--gray-30:#c6c6c6;--gray-20:#e0e0e0;--gray-10:#f4f4f4;
  --white:#ffffff;--green-40:#42be65;--red-50:#fa4d56;--yellow-30:#f1c21b;
  --teal-40:#08bdba;--purple-50:#8a3ffc;--orange-40:#ff832b;
  --topbar:52px;--bottomnav:64px;--r4:4px;--r8:8px;
  --sh-md:0 4px 16px rgba(0,0,0,.18);--sh-sm:0 2px 6px rgba(0,0,0,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;
  font-family:"IBM Plex Sans",-apple-system,sans-serif;font-size:14px;
  background:#1c2333;color:var(--gray-100);-webkit-tap-highlight-color:transparent}
#app{position:relative;width:100%;height:100dvh;overflow:hidden}

/* ── TOP BAR ── */
#topbar{position:absolute;top:0;left:0;right:0;height:var(--topbar);
  background:var(--gray-100);display:flex;align-items:center;
  padding:0 16px;gap:10px;z-index:200}
.ibm-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ibm-logo svg{width:30px;height:12px}
.bname{font-size:13px;font-weight:500;color:var(--white);white-space:nowrap}
.bname span{color:var(--blue-40)}
.spacer{flex:1}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;border-radius:var(--r4);
  color:var(--gray-30);transition:background .15s}
.icon-btn:hover,.icon-btn:active{background:var(--gray-80)}

/* ── MAP STAGE ── */
#map-wrap{position:absolute;top:var(--topbar);bottom:var(--bottomnav);
  left:0;right:0;overflow:hidden;background:#1c2333;touch-action:none;cursor:grab}
#map-wrap:active{cursor:grabbing}
#map-stage{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}

/* ── ISOMETRIC FLOOR STACK ── */
.iso-scene{position:relative}
.floor-slice{position:absolute;transform-origin:0 0}
.floor-slice svg{display:block;pointer-events:none}
/* Floor label spine — left edge */
.floor-label{position:absolute;left:-48px;
  font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;
  color:rgba(255,255,255,.7);letter-spacing:.04em;
  display:flex;align-items:center;height:24px;
  border-left:3px solid;padding-left:8px;white-space:nowrap}
/* Elevator shaft connector */
.shaft{position:absolute;pointer-events:none;z-index:2}

/* ── PINS ── */
.poi-pin{position:absolute;transform:translate(-50%,-100%);
  cursor:pointer;z-index:10;transition:transform .12s}
.poi-pin:hover,.poi-pin.active{transform:translate(-50%,-100%) scale(1.25)}
.poi-pin svg{filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.pin-label{position:absolute;top:100%;left:50%;transform:translateX(-50%);
  white-space:nowrap;background:rgba(22,22,22,.85);color:#fff;
  font-size:9px;padding:2px 5px;border-radius:3px;margin-top:2px;
  font-family:"IBM Plex Sans",sans-serif;pointer-events:none;
  opacity:0;transition:opacity .15s}
.poi-pin:hover .pin-label{opacity:1}

/* Origin/dest pins */
.nav-pin{position:absolute;transform:translate(-50%,-100%);pointer-events:none;z-index:15}

/* ── ROUTE LINE ── */
#route-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:8;overflow:visible}

/* ── SEARCH ── */
#search-bar{position:absolute;top:calc(var(--topbar) + 12px);
  left:12px;right:12px;z-index:300}
.search-wrap{background:var(--white);border-radius:var(--r8);
  box-shadow:var(--sh-md);display:flex;align-items:center;
  padding:0 12px;height:48px;gap:8px;
  border:1.5px solid transparent;transition:border-color .15s}
.search-wrap:focus-within{border-color:var(--blue-50)}
.search-wrap input{flex:1;border:none;outline:none;
  font-family:"IBM Plex Sans",sans-serif;font-size:15px;
  color:var(--gray-100);background:transparent}
.search-wrap input::placeholder{color:var(--gray-60)}
.search-x{border:none;background:none;cursor:pointer;color:var(--gray-60);
  padding:4px;display:none}
.search-x.on{display:flex}
#search-results{background:var(--white);border-radius:var(--r8);
  box-shadow:var(--sh-md);margin-top:6px;display:none;
  max-height:300px;overflow-y:auto}
#search-results.on{display:block}
.sri{display:flex;align-items:center;padding:11px 14px;gap:11px;cursor:pointer;
  border-bottom:1px solid var(--gray-20);transition:background .1s}
.sri:last-child{border-bottom:none}
.sri:hover,.sri:active{background:var(--blue-10)}
.sri-ico{width:30px;height:30px;border-radius:50%;background:var(--blue-10);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--blue-50)}
.sri-name{font-size:13px;font-weight:500;color:var(--gray-100)}
.sri-sub{font-size:11px;color:var(--gray-60);margin-top:1px}
.sri-fl{font-size:10px;font-weight:600;background:var(--gray-10);color:var(--gray-70);
  padding:2px 7px;border-radius:20px;flex-shrink:0;
  font-family:"IBM Plex Mono",monospace}

/* ── ROUTE HEADER ── */
#route-hdr{position:absolute;top:var(--topbar);left:0;right:0;
  background:var(--white);z-index:300;padding:10px 40px 10px 12px;
  box-shadow:var(--sh-sm);display:none;flex-direction:column;gap:7px}
#route-hdr.on{display:flex}
.rf{display:flex;align-items:center;gap:8px;background:var(--gray-10);
  border-radius:var(--r4);padding:8px 12px;font-size:13px;color:var(--gray-80)}
.rfdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rfdot.org{background:var(--green-40)}.rfdot.dst{background:var(--red-50)}
.rf span{flex:1}
#route-x{position:absolute;top:10px;right:10px;border:none;background:none;
  cursor:pointer;color:var(--gray-60);padding:4px}

/* ── FLOOR PILL (right side) ── */
#floor-pill{position:absolute;right:12px;
  bottom:calc(var(--bottomnav) + 76px);z-index:150;
  background:var(--white);border-radius:24px;
  box-shadow:var(--sh-md);overflow:hidden;
  border:1px solid var(--gray-20)}
.fp-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;
  font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;
  color:var(--gray-70);border-bottom:1px solid var(--gray-20);
  transition:background .12s,color .12s}
.fp-btn:last-child{border-bottom:none}
.fp-btn.active{background:var(--blue-50);color:var(--white)}
.fp-btn:hover:not(.active){background:var(--blue-10);color:var(--blue-50)}

/* ── MAP CONTROLS ── */
#map-ctrls{position:absolute;right:12px;bottom:calc(var(--bottomnav) + 16px);
  z-index:150;background:var(--white);border-radius:var(--r8);
  box-shadow:var(--sh-md);overflow:hidden;border:1px solid var(--gray-20)}
.mc-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;color:var(--gray-70);font-size:20px;
  border-bottom:1px solid var(--gray-20);transition:background .1s;user-select:none}
.mc-btn:last-child{border-bottom:none}
.mc-btn:active{background:var(--gray-10)}

/* ── VIEW TOGGLE (iso / flat) ── */
#view-toggle{position:absolute;left:12px;bottom:calc(var(--bottomnav)+16px);
  z-index:150;background:var(--white);border-radius:var(--r8);
  box-shadow:var(--sh-md);overflow:hidden;border:1px solid var(--gray-20);
  display:flex;flex-direction:column}
.vt-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;color:var(--gray-70);
  border-bottom:1px solid var(--gray-20);transition:background .12s,color .12s;
  font-size:10px;font-weight:600;font-family:"IBM Plex Mono",monospace}
.vt-btn:last-child{border-bottom:none}
.vt-btn.active{background:var(--blue-50);color:var(--white)}

/* ── BOTTOM SHEET ── */
#bsheet{position:absolute;bottom:var(--bottomnav);left:0;right:0;
  background:var(--white);border-radius:16px 16px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.2);z-index:400;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:62vh;display:flex;flex-direction:column;overflow:hidden}
#bsheet.on{transform:translateY(0)}
#bsheet.peek{transform:translateY(calc(100% - 124px))}
.bs-handle{width:36px;height:4px;background:var(--gray-30);border-radius:2px;
  margin:10px auto 0;flex-shrink:0}
#bs-body{padding:16px 20px;overflow-y:auto;flex:1}
.bs-title{font-size:18px;font-weight:600;color:var(--gray-100);margin-bottom:4px}
.bs-sub{font-size:12px;color:var(--gray-60);margin-bottom:14px;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bs-badge{font-size:10px;font-weight:600;background:var(--blue-10);
  color:var(--blue-60);padding:2px 8px;border-radius:20px;
  font-family:"IBM Plex Mono",monospace}
.bs-type-badge{font-size:10px;font-weight:500;padding:2px 8px;
  border-radius:20px;border:1px solid}
.bs-acts{display:flex;gap:8px;margin-bottom:14px}
.bs-btn{flex:1;height:40px;border:none;border-radius:var(--r4);
  font-family:"IBM Plex Sans",sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:6px}
.bs-btn.p{background:var(--blue-50);color:var(--white)}
.bs-btn.p:active{background:var(--blue-60)}
.bs-btn.s{background:var(--gray-10);color:var(--gray-80);
  border:1px solid var(--gray-20)}
.bs-btn.s:active{background:var(--gray-20)}
.bs-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;
  border-top:1px solid var(--gray-20);font-size:13px;color:var(--gray-70)}
.bs-row:first-child{border-top:none}
/* route summary */
.rs-box{background:var(--blue-10);border-radius:var(--r8);padding:12px 14px;
  margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.rs-time{font-size:22px;font-weight:600;color:var(--blue-60)}
.rs-dist{font-size:12px;color:var(--gray-70);margin-top:2px}
.rstep{display:flex;align-items:center;gap:10px;padding:9px 0;
  border-top:1px solid var(--gray-20);font-size:13px;color:var(--gray-80)}
.rstep-ico{width:26px;height:26px;border-radius:50%;background:var(--gray-10);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  color:var(--blue-50)}

/* ── BOTTOM NAV ── */
#bottom-nav{position:absolute;bottom:0;left:0;right:0;height:var(--bottomnav);
  background:var(--gray-100);display:flex;align-items:center;z-index:200;
  padding-bottom:env(safe-area-inset-bottom,0)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;height:100%;border:none;background:none;
  cursor:pointer;color:var(--gray-60);font-family:"IBM Plex Sans",sans-serif;
  font-size:10px;transition:color .15s;-webkit-tap-highlight-color:transparent}
.nav-item.active{color:var(--blue-40)}
.nav-item svg{width:22px;height:22px}

/* ── TOAST ── */
#toast{position:absolute;bottom:calc(var(--bottomnav)+14px);left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--gray-90);color:var(--white);padding:9px 18px;
  border-radius:var(--r8);font-size:13px;white-space:nowrap;
  z-index:500;transition:transform .25s ease;pointer-events:none}
#toast.on{transform:translateX(-50%) translateY(0)}

/* ── SETTINGS PANEL ── */
#settings-panel{position:absolute;inset:0;background:var(--white);
  z-index:600;display:none;flex-direction:column;overflow-y:auto}
#settings-panel.on{display:flex}
.sp-hdr{background:var(--gray-100);padding:14px 16px;
  display:flex;align-items:center;gap:12px}
.sp-hdr h2{font-size:15px;font-weight:600;color:var(--white);flex:1}
.sp-back{border:none;background:none;cursor:pointer;color:var(--gray-30);padding:4px}
.sp-sec{padding:14px 16px}
.sp-sec h3{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--gray-60);margin-bottom:8px}
.sp-row{display:flex;align-items:center;padding:11px 0;
  border-bottom:1px solid var(--gray-20);gap:12px}
.sp-row:last-child{border-bottom:none}
.sp-lbl{flex:1;font-size:14px;color:var(--gray-90)}
.sp-sub{font-size:11px;color:var(--gray-60);margin-top:2px}
.sp-divider{height:1px;background:var(--gray-20);margin:0 16px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.ttrack{position:absolute;inset:0;background:var(--gray-30);
  border-radius:11px;cursor:pointer;transition:background .2s}
.toggle input:checked+.ttrack{background:var(--blue-50)}
.ttrack::after{content:"";position:absolute;top:3px;left:3px;
  width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.ttrack::after{transform:translateX(18px)}

/* ── "YOU ARE HERE" blinking dot ── */
@keyframes pulse{0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:.5;transform:translate(-50%,-50%) scale(1.6)}}
.you-here{position:absolute;width:14px;height:14px;z-index:12;pointer-events:none}
.you-here::before,.you-here::after{content:"";position:absolute;top:50%;left:50%;
  border-radius:50%;transform:translate(-50%,-50%)}
.you-here::before{width:14px;height:14px;background:var(--blue-50);
  animation:pulse 2s infinite}
.you-here::after{width:6px;height:6px;background:#fff}

/* Floor color accents (matching reference images) */
.fl-1{color:#42be65} .fl-2{color:#0f62fe} .fl-8{color:#ff832b}
.fl-9{color:#8a3ffc} .fl-10{color:#08bdba}
.fl-border-1{border-color:#42be65} .fl-border-2{border-color:#0f62fe}
.fl-border-8{border-color:#ff832b} .fl-border-9{border-color:#8a3ffc}
.fl-border-10{border-color:#08bdba}
</style>
</head>
<body>
<div id="app">

<!-- TOP BAR -->
<header id="topbar">
  <div class="ibm-logo">
    <svg viewBox="0 0 40 16" fill="none" aria-label="IBM">
      <rect y="0" width="40" height="2" fill="#1192e8"/>
      <rect y="3.5" width="40" height="2" fill="#1192e8"/>
      <rect x="6" y="7" width="28" height="2" fill="#1192e8"/>
      <rect x="6" y="10.5" width="28" height="2" fill="#1192e8"/>
      <rect y="14" width="40" height="2" fill="#1192e8"/>
    </svg>
    <span class="bname">One Madison <span>Wayfinder</span></span>
  </div>
  <div class="spacer"></div>
  <button class="icon-btn" id="settings-btn" title="Settings">
    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
      <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/>
    </svg>
  </button>
</header>

<!-- MAP -->
<div id="map-wrap">
  <div id="map-stage">
    <div class="iso-scene" id="iso-scene">
      <!-- floors injected by JS -->
    </div>
    <svg id="route-svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6Z" fill="#0f62fe" opacity=".9"/>
        </marker>
      </defs>
    </svg>
    <div id="pins-layer" style="position:absolute;top:0;left:0"></div>
  </div>
</div>

<!-- SEARCH BAR -->
<div id="search-bar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#6f6f6f">
      <path d="M15.7 14.3l-4.2-4.2A6 6 0 1 0 10.3 11.5l4.2 4.2-1.4 1.3zM6 10.5a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9z"/>
    </svg>
    <input type="text" id="search-input" placeholder="Search rooms, amenities, floors…" autocomplete="off"/>
    <button class="search-x" id="search-x" aria-label="Clear">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M12 4.7L11.3 4 8 7.3 4.7 4 4 4.7 7.3 8 4 11.3l.7.7L8 8.7l3.3 3.3.7-.7L8.7 8z"/>
      </svg>
    </button>
  </div>
  <div id="search-results"></div>
</div>

<!-- ROUTE HEADER -->
<div id="route-hdr">
  <div class="rf"><div class="rfdot org"></div><span id="rf-from">Your location</span></div>
  <div class="rf"><div class="rfdot dst"></div><span id="rf-to">Destination</span></div>
  <button id="route-x">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#6f6f6f">
      <path d="M12 4.7L11.3 4 8 7.3 4.7 4 4 4.7 7.3 8 4 11.3l.7.7L8 8.7l3.3 3.3.7-.7L8.7 8z"/>
    </svg>
  </button>
</div>

<!-- FLOOR PILL -->
<div id="floor-pill" role="group" aria-label="Floor selector"></div>

<!-- MAP CONTROLS -->
<div id="map-ctrls">
  <button class="mc-btn" id="zoom-in" title="Zoom in">+</button>
  <button class="mc-btn" id="zoom-out" title="Zoom out">&#8722;</button>
  <button class="mc-btn" id="recenter" title="Re-center">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 12.5A5.5 5.5 0 1 1 8 2.5a5.5 5.5 0 0 1 0 11zM8 6a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
    </svg>
  </button>
</div>

<!-- VIEW TOGGLE -->
<div id="view-toggle">
  <button class="vt-btn active" id="vt-iso" title="Stacked view">ISO</button>
  <button class="vt-btn" id="vt-flat" title="Single floor view">FLAT</button>
</div>

<!-- BOTTOM SHEET -->
<div id="bsheet" role="dialog">
  <div class="bs-handle"></div>
  <div id="bs-body"></div>
</div>

<!-- BOTTOM NAV -->
<nav id="bottom-nav">
  <button class="nav-item active" id="nav-map">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="3,6 9,3 15,6 21,3 21,18 15,21 9,18 3,21"/>
      <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
    </svg>Map
  </button>
  <button class="nav-item" id="nav-explore">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>Explore
  </button>
  <button class="nav-item" id="nav-dir">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="3,11 22,2 13,21 11,13"/>
    </svg>Directions
  </button>
  <button class="nav-item" id="nav-saved">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
    </svg>Saved
  </button>
</nav>

<!-- SETTINGS PANEL -->
<div id="settings-panel">
  <div class="sp-hdr">
    <button class="sp-back" id="sp-back">
      <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
        <path d="M10 3.5L5.5 8l4.5 4.5"/>
      </svg>
    </button>
    <h2>Settings</h2>
  </div>
  <div class="sp-sec">
    <h3>Navigation</h3>

// ── STATE ─────────────────────────────────────────────
const S = {

  activeFloor: 0,     // index into FLOORS
  scale: 1, ox: 0, oy: 0,
  minScale: 0.15, maxScale: 3.5,

// ── DOM ───────────────────────────────────────────────

// ── ISO MATH ──────────────────────────────────────────
// Convert SVG (x,y) on a given floorIndex to screen px in the iso scene
function isoProject(svgX, svgY, floorIdx) {
  // Apply isometric skew: floor goes from top-left to bottom-right
  // x-axis goes right+down, y-axis goes left+down
  const px = (svgX - svgY * ISO_SKEW_X) * ISO_SCALE;
  const py = (svgX * ISO_SKEW_Y + svgY * ISO_SKEW_Y) * ISO_SCALE;
  // Lift each floor up by FLOOR_GAP * index (higher floors go UP = negative y)
  const liftY = -floorIdx * FLOOR_GAP;
  return { x: px, y: py + liftY };
}

// For flat view: simple scale
function flatProject(svgX, svgY) {
  return { x: svgX * ISO_SCALE, y: svgY * ISO_SCALE };
}

// ── FLOOR SVG LOADING ─────────────────────────────────
async function loadFloorSVG(floor) {
  if (S.svgLoaded[floor.num]) return S.svgLoaded[floor.num];
  try {
    const r = await fetch(floor.svgFile);
    const txt = await r.text();
    S.svgLoaded[floor.num] = txt;
    return txt;
  } catch(e) {
    S.svgLoaded[floor.num] = null;
    return null;
  }
}

// ── BUILD SCENE ───────────────────────────────────────
async function buildScene() {
  isoScene.innerHTML = '';
  pinsLayer.innerHTML = '';
  routeSvg.innerHTML = `<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6Z" fill="#0f62fe" opacity=".9"/></marker></defs>`;

  const isIso = S.view === 'iso';

  // Load all SVGs in parallel
  await Promise.all(FLOORS.map(f => loadFloorSVG(f)));

  // Scene bounding box calculation
  let sceneW = 0, sceneH = 0;

  FLOORS.forEach((floor, fi) => {
    const isActive = fi === S.activeFloor;
    const pois = (FLOOR_POIS[floor.num] || {pois:[]}).pois;

    // ── Floor plane ──
    const wrap = document.createElement('div');
    wrap.className = 'floor-slice';
    wrap.id = `fl-wrap-${floor.num}`;
    wrap.style.zIndex = fi;

    if (isIso) {
      // CSS 3D isometric transform on the SVG
      // We skew + scale to create the isometric floor plane look
      const scaleW = ISO_SCALE * SVG_W;
      const scaleH = ISO_SCALE * SVG_H;
      // Use CSS matrix for isometric: skewX + scaleY compress
      // matrix(scaleX, skewY, skewX, scaleY, tx, ty)
      const sx = ISO_SCALE;
      const sy = ISO_SCALE * 0.5;
      const kx = -0.5; // horizontal skew
      const ky = 0.25; // vertical skew applied via scaleY reduction
      wrap.style.transform = `matrix(${sx}, ${sy * 0.5}, ${kx * sx}, ${sy}, 0, ${-fi * FLOOR_GAP})`;
      wrap.style.transformOrigin = '0 0';
      wrap.style.opacity = isActive ? '1' : (S.settings.highlight ? '0.55' : '0.85');
    } else {
      // Flat view: only show active floor
      wrap.style.transform = `scale(${ISO_SCALE})`;
      wrap.style.transformOrigin = '0 0';
      wrap.style.display = isActive ? 'block' : 'none';
      wrap.style.opacity = '1';
    }

    // Insert SVG content
    const svgTxt = S.svgLoaded[floor.num];
    if (svgTxt) {
      // Extract just the <svg>…</svg> content
      const svgMatch = svgTxt.match(/<svg[^>]*>([\s\S]*)<\/svg>/i);
      const inner = svgMatch ? svgMatch[1] : '';
      wrap.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1224 792" width="1224" height="792" style="display:block">${inner}</svg>`;

      // Style the SVG for map look: colorize by floor
      const svgEl = wrap.querySelector('svg');
      if (svgEl) {
        // Walls → near white, floors → slight tint
        svgEl.style.background = isActive ? '#f8f9fa' : '#f0f0f0';
        // Apply floor accent border
        if (isIso && S.settings.highlight && isActive) {
          svgEl.style.outline = `2px solid ${floor.color}`;
        }
      }
    } else {
      // Placeholder
      wrap.innerHTML = `<div style="width:1224px;height:792px;background:#2a2a3a;border:1px solid #444;display:flex;align-items:center;justify-content:center;color:#888;font-size:18px">Floor ${floor.label} — plan loading…</div>`;
    }

    // ── Floor label ──
    if (isIso || isActive) {
      const lbl = document.createElement('div');
      lbl.className = `floor-label fl-border-${floor.num}`;
      lbl.style.color = floor.color;
      // In iso, position label at left edge of this floor plane
      // The left edge in iso coords corresponds to svgX=0, svgY=792/2
      if (isIso) {
        const projLeft = isoProject(0, SVG_H/2, fi);
        lbl.style.left = (projLeft.x - 56) + 'px';
        lbl.style.top  = (projLeft.y - 12) + 'px';
        lbl.style.position = 'absolute';
        lbl.style.zIndex = 50;
        lbl.textContent = floor.label;
        isoScene.appendChild(lbl);
      } else {
        lbl.style.position = 'absolute';
        lbl.style.left = '-50px';
        lbl.style.top = (SVG_H * ISO_SCALE / 2 - 12) + 'px';
        lbl.textContent = floor.label;
        wrap.appendChild(lbl);
      }
    }

    isoScene.appendChild(wrap);
  });

  // ── Elevator shaft connector (iso only) ──
  if (isIso) {
    drawElevatorShaft();
  }

  // ── POI Pins ──
  renderPins();

  // Update scene size for centering
  requestAnimationFrame(() => centerMap(false));
}

// ── ELEVATOR SHAFT ────────────────────────────────────
function drawElevatorShaft() {
  // Draw vertical lines connecting elevator positions across floors
  // Use the elevator lobby area (approx SVG coords 500,330 on all floors)
  const shaftPoints = [
    { svgX: 497, svgY: 340 },  // Elevator lobby A
    { svgX: 670, svgY: 315 },  // Elevator lobby D
  ];

  shaftPoints.forEach(sp => {
    const shaft = document.createElement('div');
    shaft.className = 'shaft';

    // Top floor projected position
    const top = isoProject(sp.svgX, sp.svgY, FLOORS.length - 1);
    // Bottom floor projected position
    const bot = isoProject(sp.svgX, sp.svgY, 0);

    const x = top.x;
    const y = Math.min(top.y, bot.y) - 8;
    const h = Math.abs(top.y - bot.y) + 16;

    shaft.style.cssText = `
      left:${x - 6}px; top:${y}px;
      width:12px; height:${h}px;
      background:linear-gradient(180deg,rgba(8,189,186,.7) 0%,rgba(8,189,186,.2) 100%);
      border-left:2px solid rgba(8,189,186,.6);
      border-right:2px solid rgba(8,189,186,.6);
      z-index:30;
    `;
    isoScene.appendChild(shaft);
  });
}

// ── RENDER PINS ───────────────────────────────────────
function renderPins() {
  pinsLayer.innerHTML = '';
  const isIso = S.view === 'iso';

  FLOORS.forEach((floor, fi) => {
    const isActive = fi === S.activeFloor;
    const pois = (FLOOR_POIS[floor.num] || {pois:[]}).pois;
    if (!isIso && !isActive) return;

    pois.forEach(poi => {
      const cfg = TYPE_CFG[poi.type] || TYPE_CFG.room;
      let proj;
      if (isIso) {
        proj = isoProject(poi.x, poi.y, fi);
      } else {
        proj = flatProject(poi.x, poi.y);
      }

      const pin = document.createElement('div');
      pin.className = 'poi-pin';
      pin.dataset.poiId = poi.id;
      pin.dataset.floorIdx = fi;
      pin.style.left = proj.x + 'px';
      pin.style.top  = proj.y + 'px';
      // In iso, non-active floors show smaller pins
      const pinSize = (isIso && !isActive) ? 16 : 22;
      pin.innerHTML = `
        <svg width="${pinSize}" height="${Math.round(pinSize*1.3)}" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 0C6.27 0 0 6.27 0 14c0 9.94 14 22 14 22S28 23.94 28 14C28 6.27 21.73 0 14 0z" fill="${cfg.color}" opacity="${(isIso && !isActive) ? 0.5 : 1}"/>
          <circle cx="14" cy="14" r="7" fill="white" opacity=".9"/>
          <svg x="7" y="7" width="14" height="14" viewBox="0 0 16 16" fill="${cfg.color}">${cfg.icon}</svg>
        </svg>
        <div class="pin-label">${poi.label}</div>`;
      pin.addEventListener('click', e => {
        e.stopPropagation();
        if (S.routeMode && S.routeStep) {
          assignRoutePoint(poi, fi);
        } else {
          // Switch to that floor in flat mode automatically
          if (!isActive) switchFloor(fi);
          showPOISheet(poi, fi);
        }
      });
      pinsLayer.appendChild(pin);
    });
  });

  // Origin / dest markers
  if (S.origin) drawNavPin(S.origin, 'org');
  if (S.dest)   drawNavPin(S.dest, 'dst');

  // You-are-here dot (floor 8 near elevator lobby as demo)
  if (S.view === 'flat') {
    const yah = document.createElement('div');
    yah.className = 'you-here';
    const proj = flatProject(498, 300);
    yah.style.left = (proj.x - 7) + 'px';
    yah.style.top  = (proj.y - 7) + 'px';
    pinsLayer.appendChild(yah);
  }
}

function drawNavPin(pt, type) {
  const fi = pt.floorIdx;
  const isIso = S.view === 'iso';
  const proj = isIso ? isoProject(pt.x, pt.y, fi) : flatProject(pt.x, pt.y);
  const color = type === 'org' ? '#42be65' : '#fa4d56';
  const pin = document.createElement('div');
  pin.className = 'nav-pin';
  pin.style.left = proj.x + 'px';
  pin.style.top  = proj.y + 'px';
  pin.innerHTML = `<svg width="26" height="34" viewBox="0 0 28 36">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 9.94 14 22 14 22S28 23.94 28 14C28 6.27 21.73 0 14 0z" fill="${color}"/>
    <circle cx="14" cy="14" r="5" fill="white"/>
  </svg>`;
  pinsLayer.appendChild(pin);
}

// ── ROUTE DRAWING ─────────────────────────────────────
function drawRoute() {
  // Clear old
  routeSvg.querySelectorAll('.rpath').forEach(e => e.remove());
  if (!S.origin || !S.dest) return;

  const isIso = S.view === 'iso';
  const o = isoProject(S.origin.x, S.origin.y, S.origin.floorIdx);
  const d = isoProject(S.dest.x, S.dest.y, S.dest.floorIdx);

  // If different floors: route goes to elevator, up/down, then to dest
  let pts = [];
  if (S.origin.floorIdx === S.dest.floorIdx) {
    // Same floor: L-shaped path
    const mid = isoProject(S.dest.x, S.origin.y, S.origin.floorIdx);
    pts = [o, mid, d];
  } else {
    // Cross-floor: to elevator on origin floor, shaft up/down, from elevator on dest floor
    const elevOrigin = isoProject(SHAFT_X * ISO_SCALE, 330 * ISO_SCALE, S.origin.floorIdx);
    const elevDest   = isoProject(SHAFT_X * ISO_SCALE, 330 * ISO_SCALE, S.dest.floorIdx);
    pts = [o, elevOrigin, elevDest, d];
  }

  const pathD = pts.map((p,i) => `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

  const shadow = document.createElementNS('http://www.w3.org/2000/svg','path');
  shadow.setAttribute('d', pathD);
  shadow.setAttribute('class','rpath');
  shadow.setAttribute('fill','none');
  shadow.setAttribute('stroke','rgba(0,0,0,.2)');
  shadow.setAttribute('stroke-width','9');
  shadow.setAttribute('stroke-linecap','round');
  shadow.setAttribute('stroke-linejoin','round');
  routeSvg.appendChild(shadow);

  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', pathD);
  path.setAttribute('class','rpath');
  path.setAttribute('fill','none');
  path.setAttribute('stroke','#0f62fe');
  path.setAttribute('stroke-width','5');
  path.setAttribute('stroke-linecap','round');
  path.setAttribute('stroke-linejoin','round');
  path.setAttribute('stroke-dasharray','12 5');
  if (S.settings.arrows) path.setAttribute('marker-end','url(#arr)');
  routeSvg.appendChild(path);
}

function clearRoute() {
  S.origin = null; S.dest = null;
  routeSvg.querySelectorAll('.rpath').forEach(e => e.remove());
}

// ── PAN / ZOOM ────────────────────────────────────────
function applyTransform(anim) {
  if (anim) {
    mapStage.style.transition = 'transform .25s cubic-bezier(.4,0,.2,1)';
    setTimeout(() => mapStage.style.transition = '', 260);
  }
  mapStage.style.transform = `translate(${S.ox}px,${S.oy}px) scale(${S.scale})`;
}

function centerMap(anim=true) {
  const vw = mapWrap.clientWidth, vh = mapWrap.clientHeight;
  const sceneRect = isoScene.getBoundingClientRect();
  // Estimate scene size from floor transforms
  const isIso = S.view === 'iso';
  const estW = isIso ? SVG_W * ISO_SCALE * 0.8 : SVG_W * ISO_SCALE;
  const estH = isIso ? SVG_H * ISO_SCALE * 0.5 + FLOORS.length * FLOOR_GAP : SVG_H * ISO_SCALE;
  const fit = Math.min(vw / estW, vh / estH) * 0.82;
  S.scale = Math.max(S.minScale, Math.min(S.maxScale, fit));
  S.ox = (vw - estW * S.scale) / 2;
  S.oy = (vh - estH * S.scale) / 2;
  applyTransform(anim);
}

function zoomAt(cx, cy, factor) {
  const ns = Math.max(S.minScale, Math.min(S.maxScale, S.scale * factor));
  const r = ns / S.scale;
  S.ox = cx - (cx - S.ox) * r;
  S.oy = cy - (cy - S.oy) * r;
  S.scale = ns;
  applyTransform(false);
}

// Touch
let tLX=0,tLY=0,tDragging=false,pOriX=0,pOriY=0,pLastD=0;
mapWrap.addEventListener('touchstart', e => {
  if (e.touches.length===1) {
    tLX=e.touches[0].clientX; tLY=e.touches[0].clientY; tDragging=true;
  } else if (e.touches.length===2) {
    pLastD = Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                        e.touches[0].clientY-e.touches[1].clientY);
    const r = mapWrap.getBoundingClientRect();
    pOriX = (e.touches[0].clientX+e.touches[1].clientX)/2 - r.left;
    pOriY = (e.touches[0].clientY+e.touches[1].clientY)/2 - r.top;
    tDragging=false;
  }
},{passive:false});
mapWrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length===1 && tDragging) {
    S.ox += e.touches[0].clientX-tLX; S.oy += e.touches[0].clientY-tLY;
    tLX=e.touches[0].clientX; tLY=e.touches[0].clientY;
    applyTransform(false);
  } else if (e.touches.length===2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                         e.touches[0].clientY-e.touches[1].clientY);
    zoomAt(pOriX, pOriY, d/pLastD); pLastD=d;
  }
},{passive:false});
mapWrap.addEventListener('touchend', e => { if (e.touches.length===0) tDragging=false; },{passive:true});

// Mouse
let mDown=false,mSX=0,mSY=0,mMoved=0;
mapWrap.addEventListener('mousedown', e => {
  if (e.button!==0) return; mDown=true; mSX=e.clientX; mSY=e.clientY; mMoved=0;
});
mapWrap.addEventListener('mousemove', e => {
  if (!mDown) return;
  mMoved += Math.abs(e.movementX)+Math.abs(e.movementY);
  S.ox+=e.movementX; S.oy+=e.movementY; applyTransform(false);
});
mapWrap.addEventListener('mouseup', () => mDown=false);
mapWrap.addEventListener('mouseleave', () => mDown=false);
mapWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const r = mapWrap.getBoundingClientRect();
  zoomAt(e.clientX-r.left, e.clientY-r.top, e.deltaY<0?1.12:1/1.12);
},{passive:false});

// Click on map (not on pins)
mapWrap.addEventListener('click', e => {
  if (mMoved > 5) return;
  if (S.routeMode) return;
  hideBSheet();
});

document.getElementById('zoom-in').onclick = () => { const c=mapWrap.clientWidth/2,cv=mapWrap.clientHeight/2; zoomAt(c,cv,1.35); };
document.getElementById('zoom-out').onclick = () => { const c=mapWrap.clientWidth/2,cv=mapWrap.clientHeight/2; zoomAt(c,cv,1/1.35); };
document.getElementById('recenter').onclick = () => centerMap(true);

// ── FLOOR SWITCHER ────────────────────────────────────
function buildFloorPill() {
  floorPill.innerHTML = '';
  // Reversed: top floor at top
  [...FLOORS].reverse().forEach(fl => {
    const origIdx = FLOORS.findIndex(f => f.num===fl.num);
    const btn = document.createElement('button');
    btn.className = 'fp-btn' + (origIdx===S.activeFloor ? ' active' : '');
    btn.textContent = fl.label;
    btn.style.setProperty('--fc', fl.color);
    btn.setAttribute('aria-label', fl.name);
    btn.addEventListener('click', () => switchFloor(origIdx));
    floorPill.appendChild(btn);
  });
}

function switchFloor(idx) {
  S.activeFloor = idx;
  buildFloorPill();
  if (S.view==='flat') {
    document.querySelectorAll('.floor-slice').forEach((w,i) => {
      w.style.display = (i===idx) ? 'block' : 'none';
    });
    renderPins();
  } else {
    // In iso: just update opacity
    FLOORS.forEach((fl,i) => {
      const w = document.getElementById(`fl-wrap-${fl.num}`);
      if (w) w.style.opacity = (i===idx) ? '1' : (S.settings.highlight ? '0.5' : '0.85');
    });
    renderPins();
  }
  showToast(FLOORS[idx].name);
  clearRoute();
  hideBSheet();
}

// ── SEARCH ────────────────────────────────────────────
function allPOIs() {
  return FLOORS.flatMap((fl,fi) =>
    (FLOOR_POIS[fl.num]||{pois:[]}).pois.map(p => ({...p, floorIdx:fi, floorName:fl.name, floorLabel:fl.label, floorColor:fl.color}))
  );
}

searchInp.addEventListener('input', () => {
  const q = searchInp.value.trim().toLowerCase();
  searchX.classList.toggle('on', q.length>0);
  if (!q) { searchRes.classList.remove('on'); return; }
  const hits = allPOIs().filter(p =>
    p.label.toLowerCase().includes(q) || (p.desc||'').toLowerCase().includes(q)
  );
  renderSearchResults(hits, q);
});
searchInp.addEventListener('focus', () => {
  if (searchInp.value.trim()) searchRes.classList.add('on');
});
document.addEventListener('click', e => {
  if (!document.getElementById('search-bar').contains(e.target))
    searchRes.classList.remove('on');
});
searchX.addEventListener('click', () => {
  searchInp.value=''; searchX.classList.remove('on'); searchRes.classList.remove('on'); searchInp.focus();
});

function renderSearchResults(items, q) {
  const cfg = TYPE_CFG;
  if (!items.length) {
    searchRes.innerHTML = `<div class="sri"><div class="sri-name" style="color:#6f6f6f">No results for "${q}"</div></div>`;
    searchRes.classList.add('on'); return;
  }
  searchRes.innerHTML = items.slice(0,10).map(p => {
    const c = cfg[p.type]||cfg.room;
    return `<div class="sri" data-pid="${p.id}" data-fi="${p.floorIdx}">
      <div class="sri-ico" style="background:${c.color}20;color:${c.color}">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">${c.icon}</svg>
      </div>
      <div style="flex:1">
        <div class="sri-name">${hl(p.label,q)}</div>
        <div class="sri-sub">${p.desc||p.floorName}</div>
      </div>
      <span class="sri-fl" style="background:${p.floorColor}20;color:${p.floorColor}">${p.floorLabel}</span>
    </div>`;
  }).join('');
  searchRes.classList.add('on');
  searchRes.querySelectorAll('.sri[data-pid]').forEach(el => {
    el.addEventListener('click', () => {
      const fi = parseInt(el.dataset.fi);
      const poi = (FLOOR_POIS[FLOORS[fi].num]||{pois:[]}).pois.find(p=>p.id===el.dataset.pid);
      if (!poi) return;
      searchRes.classList.remove('on');
      searchInp.value = poi.label;
      if (fi!==S.activeFloor) switchFloor(fi);
      flyTo(poi.x, poi.y, fi, 1.8);
      showPOISheet(poi, fi);
    });
  });
}

function hl(text, q) {
  const i = text.toLowerCase().indexOf(q);
  if (i<0) return text;
  return text.slice(0,i)+`<strong style="color:#0f62fe">${text.slice(i,i+q.length)}</strong>`+text.slice(i+q.length);
}

// ── FLY TO ────────────────────────────────────────────
function flyTo(svgX, svgY, floorIdx, targetScale=1.8) {
  const vw=mapWrap.clientWidth, vh=mapWrap.clientHeight;
  const isIso = S.view==='iso';
  const proj = isIso ? isoProject(svgX,svgY,floorIdx) : flatProject(svgX,svgY);
  S.scale = Math.min(S.maxScale, Math.max(S.minScale, targetScale));
  S.ox = vw/2 - proj.x * S.scale;
  S.oy = vh/2 - proj.y * S.scale;
  applyTransform(true);
}

// ── POI SHEET ─────────────────────────────────────────
function showPOISheet(poi, fi) {
  const floor = FLOORS[fi];
  const cfg = TYPE_CFG[poi.type]||TYPE_CFG.room;
  const saved = S.saved.some(s=>s.id===poi.id);
  const label = (poi.label||'').replace(/&amp;/g,'&');
  bsBody.innerHTML = `
    <div class="bs-title">${label}</div>
    <div class="bs-sub">
      <span class="bs-badge" style="background:${floor.color}18;color:${floor.color}">${floor.name}</span>
      <span class="bs-type-badge" style="color:${cfg.color};border-color:${cfg.color}40">${poi.type}</span>
    </div>
    <div class="bs-acts">
      <button class="bs-btn p" id="bs-dir">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3,11 22,2 13,21 11,13"/></svg>
        Directions
      </button>
      <button class="bs-btn s" id="bs-save">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        ${saved?'Saved ✓':'Save'}
      </button>
    </div>
    <div class="bs-row">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="${cfg.color}">${cfg.icon}</svg>
      <span>${poi.desc||floor.name}</span>
    </div>
    <div class="bs-row">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="#6f6f6f"><path d="M8 1C5.24 1 3 3.24 3 6c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 7.5A2.5 2.5 0 1 1 8 4a2.5 2.5 0 0 1 0 5z"/></svg>
      <span>${floor.name} — IBM One Madison Ave</span>
    </div>`;
  document.getElementById('bs-dir').onclick = () => { hideBSheet(); startRouteMode(null, {poi,fi}); };
  document.getElementById('bs-save').onclick = () => { toggleSave(poi); showPOISheet(poi,fi); };
  showBSheet('on');
}

function toggleSave(poi) {
  const idx = S.saved.findIndex(s=>s.id===poi.id);
  if (idx>=0) { S.saved.splice(idx,1); showToast('Removed from saved'); }
  else { S.saved.push(poi); showToast('Saved!'); }
}

// ── ROUTE MODE ────────────────────────────────────────
function startRouteMode(origin=null, destObj=null) {
  S.routeMode = true;
  document.getElementById('search-bar').style.display='none';
  routeHdr.classList.add('on');
  if (destObj) {
    const lbl = (destObj.poi.label||'').replace(/&amp;/g,'&');
    S.dest = { x:destObj.poi.x, y:destObj.poi.y, floorIdx:destObj.fi, label:lbl };
    document.getElementById('rf-to').textContent = lbl;
    S.routeStep = 'origin'; showToast('Tap your starting point');
  }
  if (origin) {
    S.origin = origin;
    document.getElementById('rf-from').textContent = origin.label;
    S.routeStep = null;
    if (S.dest) { drawRoute(); showRouteSheet(); }
  }
  renderPins();
  activateNav('dir');
}

function exitRouteMode() {
  S.routeMode=false; S.routeStep=null;
  clearRoute(); renderPins();
  routeHdr.classList.remove('on');
  document.getElementById('search-bar').style.display='';
  document.getElementById('rf-from').textContent='Your location';
  document.getElementById('rf-to').textContent='Destination';
  activateNav('map'); hideBSheet();
}

function assignRoutePoint(poi, fi) {
  const lbl = (poi.label||'').replace(/&amp;/g,'&');
  if (S.routeStep==='origin') {
    S.origin = { x:poi.x, y:poi.y, floorIdx:fi, label:lbl };
    document.getElementById('rf-from').textContent = lbl;
    S.routeStep = S.dest ? null : 'dest';
    if (!S.dest) showToast('Now tap destination');
  } else if (S.routeStep==='dest') {
    S.dest = { x:poi.x, y:poi.y, floorIdx:fi, label:lbl };
    document.getElementById('rf-to').textContent = lbl;
    S.routeStep = null;
  }
  renderPins();
  if (S.origin && S.dest) { drawRoute(); showRouteSheet(); }
}

function showRouteSheet() {
  if (!S.origin||!S.dest) return;
  const oFloor = FLOORS[S.origin.floorIdx];
  const dFloor = FLOORS[S.dest.floorIdx];
  const dx = S.dest.x-S.origin.x, dy = S.dest.y-S.origin.y;
  const distPx = Math.sqrt(dx*dx+dy*dy) + (S.origin.floorIdx!==S.dest.floorIdx ? Math.abs(S.origin.floorIdx-S.dest.floorIdx)*80 : 0);
  const metres = Math.max(10, Math.round(distPx*0.14));
  const mins = Math.max(1, Math.round(metres/85));
  const sameFloor = S.origin.floorIdx===S.dest.floorIdx;
  const steps = sameFloor
    ? [`Head to ${S.dest.label}`, `Arrive at <strong>${S.dest.label}</strong>`]
    : [`Head to elevator on ${oFloor.name}`,
       `Take elevator to ${dFloor.name}`,
       `Walk to <strong>${S.dest.label}</strong>`];

  bsBody.innerHTML = `
    <div class="bs-title">Route</div>
    <div class="bs-sub"><span>${(S.origin.label||'').replace(/&amp;/g,'&')}</span><span style="margin:0 6px">→</span><span>${(S.dest.label||'').replace(/&amp;/g,'&')}</span></div>
    <div class="rs-box">
      <div><div class="rs-time">${mins} min</div><div class="rs-dist">${metres} m walk</div></div>
      <button class="bs-btn p" id="start-nav" style="flex:0;padding:0 18px">Start</button>
    </div>
    ${steps.map((s,i) => `<div class="rstep">
      <div class="rstep-ico" style="${i===steps.length-1?'background:#fa4d5620;color:#fa4d56':''}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          ${i===steps.length-1?'<circle cx="12" cy="12" r="8"/>':'<polygon points="3,11 22,2 13,21 11,13"/>'}
        </svg>
      </div>
      <span>${s}</span>
    </div>`).join('')}`;
  document.getElementById('start-nav').onclick = () => showToast('Follow the blue path');
  showBSheet('peek');
}

document.getElementById('route-x').onclick = exitRouteMode;

// ── EXPLORE ───────────────────────────────────────────
function openExplore() {
  const groups = {};
  allPOIs().filter(p=>p.type!=='room').forEach(p => {
    if (!groups[p.type]) groups[p.type]=[];
    groups[p.type].push(p);
  });
  let html = '<div class="bs-title">Explore Building</div><div class="bs-sub">All locations — tap to navigate</div>';
  Object.keys(groups).sort().forEach(t => {
    const cfg = TYPE_CFG[t]||TYPE_CFG.room;
    html += `<div style="margin-bottom:12px">
      <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:${cfg.color};margin:10px 0 6px">${t}</div>
      ${groups[t].slice(0,8).map(p => `
        <div class="sri" data-pid="${p.id}" data-fi="${p.floorIdx}" style="padding:9px 0;border-bottom:1px solid #e0e0e0">
          <div class="sri-ico" style="background:${cfg.color}18;color:${cfg.color}">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">${cfg.icon}</svg>
          </div>
          <div style="flex:1"><div class="sri-name">${(p.label||'').replace(/&amp;/g,'&')}</div><div class="sri-sub">${p.floorName}</div></div>
          <span class="sri-fl" style="background:${p.floorColor}18;color:${p.floorColor}">${p.floorLabel}</span>
        </div>`).join('')}
    </div>`;
  });
  bsBody.innerHTML = html;
  bsBody.querySelectorAll('.sri[data-pid]').forEach(el => {
    el.addEventListener('click', () => {
      const fi=parseInt(el.dataset.fi);
      const poi=(FLOOR_POIS[FLOORS[fi].num]||{pois:[]}).pois.find(p=>p.id===el.dataset.pid);
      if (!poi) return;
      if (fi!==S.activeFloor) switchFloor(fi);
      flyTo(poi.x,poi.y,fi,1.8);
      showPOISheet(poi,fi);
    });
  });
  showBSheet('on');
}

// ── SAVED ─────────────────────────────────────────────
function openSaved() {
  if (!S.saved.length) {
    bsBody.innerHTML = `<div class="bs-title">Saved Places</div>
      <div style="padding:24px 0;text-align:center;color:#6f6f6f;font-size:13px">
        Tap the bookmark icon on any location to save it here.
      </div>`;
  } else {
    bsBody.innerHTML = `<div class="bs-title">Saved Places</div>
      <div class="bs-sub">${S.saved.length} place${S.saved.length>1?'s':''} saved</div>
      ${S.saved.map((p,i) => {
        const cfg=TYPE_CFG[p.type]||TYPE_CFG.room;
        return `<div class="sri" data-si="${i}" style="padding:10px 0;border-bottom:1px solid #e0e0e0">
          <div class="sri-ico" style="background:${cfg.color}18;color:${cfg.color}">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">${cfg.icon}</svg>
          </div>
          <div style="flex:1"><div class="sri-name">${(p.label||'').replace(/&amp;/g,'&')}</div><div class="sri-sub">${p.desc||''}</div></div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0f62fe" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </div>`;
      }).join('')}`;
    bsBody.querySelectorAll('.sri[data-si]').forEach(el => {
      el.addEventListener('click', () => {
        const p = S.saved[parseInt(el.dataset.si)];
        const fi = FLOORS.findIndex(f => (FLOOR_POIS[f.num]||{pois:[]}).pois.some(x=>x.id===p.id));
        if (fi<0) return;
        if (fi!==S.activeFloor) switchFloor(fi);
        flyTo(p.x,p.y,fi,1.8);
        showPOISheet(p,fi);
      });
    });
  }
  showBSheet('on');
}

// ── BOTTOM NAV ────────────────────────────────────────
function activateNav(id) {
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+id)?.classList.add('active');
}
document.getElementById('nav-map').onclick = () => { activateNav('map'); hideBSheet(); };
document.getElementById('nav-explore').onclick = () => { activateNav('explore'); openExplore(); };
document.getElementById('nav-dir').onclick = () => { activateNav('dir'); startRouteMode(); };
document.getElementById('nav-saved').onclick = () => { activateNav('saved'); openSaved(); };

// ── BOTTOM SHEET ──────────────────────────────────────
function showBSheet(cls='on') {
  bsheet.classList.remove('on','peek');
  bsheet.classList.add(cls);
}
function hideBSheet() { bsheet.classList.remove('on','peek'); }
const bsHandle = bsheet.querySelector('.bs-handle');
let bsDragY=0;
bsHandle.addEventListener('touchstart',e=>{bsDragY=e.touches[0].clientY;},{passive:true});
bsHandle.addEventListener('touchmove',e=>{if(e.touches[0].clientY-bsDragY>40)hideBSheet();},{passive:true});

// ── SETTINGS ──────────────────────────────────────────
document.getElementById('settings-btn').onclick = () => document.getElementById('settings-panel').classList.add('on');
document.getElementById('sp-back').onclick = () => document.getElementById('settings-panel').classList.remove('on');
document.getElementById('t-access').onchange = e => S.settings.access=e.target.checked;
document.getElementById('t-arrows').onchange = e => { S.settings.arrows=e.target.checked; drawRoute(); };
document.getElementById('t-labels').onchange = e => S.settings.labels=e.target.checked;
document.getElementById('t-highlight').onchange = e => { S.settings.highlight=e.target.checked; buildScene(); };

// ── TOAST ─────────────────────────────────────────────
let toastTmr;
function showToast(msg) {
  toast.textContent=msg; toast.classList.add('on');
  clearTimeout(toastTmr); toastTmr=setTimeout(()=>toast.classList.remove('on'),2400);
}

// ── BOOTSTRAP ─────────────────────────────────────────
async function init() {
  // Set Floor 8 as default active (most content)
  S.activeFloor = FLOORS.findIndex(f=>f.num==='8');
  if (S.activeFloor<0) S.activeFloor=0;
  buildFloorPill();
  await buildScene();
  showToast('IBM One Madison — Floors 1, 2, 8, 9, 10');
}

init();
</script>
</body>
</html>
