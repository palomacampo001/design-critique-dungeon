<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>IBM One Madison — Wayfinder</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --b50:#0f62fe;--b40:#4589ff;--b10:#edf5ff;--b60:#0043ce;
  --g100:#161616;--g90:#262626;--g80:#393939;--g70:#525252;--g60:#6f6f6f;
  --g30:#c6c6c6;--g20:#e0e0e0;--g10:#f4f4f4;--wh:#ffffff;
  --green:#42be65;--red:#fa4d56;--orange:#ff832b;--purple:#8a3ffc;--teal:#08bdba;
  --topbar:52px;--botnav:64px;
}
html,body{height:100%;width:100%;overflow:hidden;
  font-family:"IBM Plex Sans",-apple-system,sans-serif;
  font-size:14px;color:var(--g100);background:#1a1f2e}
#app{position:relative;width:100%;height:100dvh;overflow:hidden}

/* TOPBAR */
#topbar{position:absolute;top:0;left:0;right:0;height:var(--topbar);
  background:var(--g100);display:flex;align-items:center;
  padding:0 16px;gap:10px;z-index:200;
  padding-top:env(safe-area-inset-top,0)}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo svg{width:30px;height:12px}
.bname{font-size:13px;font-weight:500;color:#fff;white-space:nowrap}
.bname b{color:var(--b40);font-weight:500}
.sp{flex:1}
.ib{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;border-radius:4px;color:var(--g30);
  transition:background .15s}
.ib:active{background:var(--g80)}

/* MAP */
#map-wrap{position:absolute;top:var(--topbar);bottom:var(--botnav);
  left:0;right:0;overflow:hidden;touch-action:none;cursor:grab;
  background:#1a1f2e}
#map-wrap.grabbing{cursor:grabbing}
#map-canvas{position:absolute;top:0;left:0;
  transform-origin:0 0;will-change:transform}
#pin-layer{position:absolute;top:0;left:0;pointer-events:none}

/* SEARCH */
#sbar{position:absolute;top:calc(var(--topbar)+12px);
  left:12px;right:12px;z-index:300}
.sw{background:#fff;border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  display:flex;align-items:center;padding:0 12px;height:48px;gap:8px;
  border:1.5px solid transparent;transition:border-color .15s}
.sw:focus-within{border-color:var(--b50)}
.sw input{flex:1;border:none;outline:none;
  font-family:"IBM Plex Sans",sans-serif;font-size:15px;
  color:var(--g100);background:transparent}
.sw input::placeholder{color:var(--g60)}
#sx{border:none;background:none;cursor:pointer;color:var(--g60);
  padding:4px;display:none}
#sx.on{display:flex}
#sres{background:#fff;border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  margin-top:6px;display:none;max-height:280px;overflow-y:auto}
#sres.on{display:block}
.sri{display:flex;align-items:center;padding:11px 14px;gap:10px;
  cursor:pointer;border-bottom:1px solid var(--g20);transition:background .1s}
.sri:last-child{border-bottom:none}
.sri:active{background:var(--b10)}
.si{width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sn{font-size:13px;font-weight:500;color:var(--g100)}
.ss{font-size:11px;color:var(--g60);margin-top:1px}
.sf{font-size:10px;font-weight:600;padding:2px 7px;
  border-radius:20px;flex-shrink:0;
  font-family:"IBM Plex Mono",monospace}

/* ROUTE HDR */
#rhdr{position:absolute;top:var(--topbar);left:0;right:0;
  background:#fff;z-index:300;padding:10px 44px 10px 12px;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
  display:none;flex-direction:column;gap:7px}
#rhdr.on{display:flex}
.rf{display:flex;align-items:center;gap:8px;
  background:var(--g10);border-radius:4px;
  padding:8px 12px;font-size:13px;color:var(--g80)}
.rfd{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rf span{flex:1}
#rx{position:absolute;top:10px;right:10px;
  border:none;background:none;cursor:pointer;color:var(--g60);padding:4px}

/* FLOOR PILL */
#fpill{position:absolute;right:12px;
  bottom:calc(var(--botnav)+80px);z-index:150;
  background:#fff;border-radius:24px;
  box-shadow:0 4px 16px rgba(0,0,0,.18);
  overflow:hidden;border:1px solid var(--g20)}
.fb{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;
  font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;
  color:var(--g70);border-bottom:1px solid var(--g20);
  transition:background .12s,color .12s}
.fb:last-child{border-bottom:none}
.fb.on{background:var(--b50);color:#fff}
.fb:hover:not(.on){background:var(--b10);color:var(--b50)}

/* MAP CONTROLS */
#mctl{position:absolute;right:12px;
  bottom:calc(var(--botnav)+16px);z-index:150;
  background:#fff;border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.18);
  overflow:hidden;border:1px solid var(--g20)}
.mb{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;color:var(--g70);font-size:20px;
  border-bottom:1px solid var(--g20);transition:background .1s;user-select:none}
.mb:last-child{border-bottom:none}
.mb:active{background:var(--g10)}

/* BOTTOM SHEET */
#bs{position:absolute;bottom:var(--botnav);left:0;right:0;
  background:#fff;border-radius:16px 16px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.2);z-index:400;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:65vh;display:flex;flex-direction:column;overflow:hidden}
#bs.on{transform:translateY(0)}
#bs.pk{transform:translateY(calc(100% - 130px))}
.bsh{width:36px;height:4px;background:var(--g30);border-radius:2px;
  margin:10px auto 0;flex-shrink:0;cursor:pointer}
#bsb{padding:16px 20px;overflow-y:auto;flex:1}
.bst{font-size:18px;font-weight:600;color:var(--g100);margin-bottom:4px}
.bss{font-size:12px;color:var(--g60);margin-bottom:14px;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bbg{font-size:10px;font-weight:600;padding:2px 8px;
  border-radius:20px;font-family:"IBM Plex Mono",monospace}
.bacts{display:flex;gap:8px;margin-bottom:14px}
.bbt{flex:1;height:40px;border:none;border-radius:4px;
  font-family:"IBM Plex Sans",sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:6px}
.bbt.p{background:var(--b50);color:#fff}
.bbt.p:active{background:var(--b60)}
.bbt.s{background:var(--g10);color:var(--g80);border:1px solid var(--g20)}
.bbt.s:active{background:var(--g20)}
.brow{display:flex;align-items:flex-start;gap:10px;
  padding:10px 0;border-top:1px solid var(--g20);
  font-size:13px;color:var(--g70)}
.rsbox{background:var(--b10);border-radius:8px;padding:12px 14px;
  margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.rst{font-size:22px;font-weight:600;color:var(--b60)}
.rsd{font-size:12px;color:var(--g70);margin-top:2px}
.step{display:flex;align-items:center;gap:10px;padding:9px 0;
  border-top:1px solid var(--g20);font-size:13px;color:var(--g80)}
.stpi{width:26px;height:26px;border-radius:50%;background:var(--g10);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--b50)}

/* BOTTOM NAV */
#bnav{position:absolute;bottom:0;left:0;right:0;height:var(--botnav);
  background:var(--g100);display:flex;align-items:center;z-index:200;
  padding-bottom:env(safe-area-inset-bottom,0)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;height:100%;
  border:none;background:none;cursor:pointer;
  color:var(--g60);font-family:"IBM Plex Sans",sans-serif;
  font-size:10px;transition:color .15s}
.ni.on{color:var(--b40)}
.ni svg{width:22px;height:22px}

/* TOAST */
#toast{position:absolute;bottom:calc(var(--botnav)+14px);left:50%;
  transform:translateX(-50%) translateY(50px);
  background:var(--g90);color:#fff;padding:9px 18px;
  border-radius:8px;font-size:13px;white-space:nowrap;
  z-index:500;transition:transform .25s ease;pointer-events:none;
  opacity:0;transition:transform .25s ease,opacity .25s ease}
#toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* SETTINGS */
#spanel{position:absolute;inset:0;background:#fff;
  z-index:600;display:none;flex-direction:column;overflow-y:auto}
#spanel.on{display:flex}
.sphdr{background:var(--g100);padding:14px 16px;display:flex;align-items:center;gap:12px}
.sphdr h2{font-size:15px;font-weight:600;color:#fff;flex:1}
.spbk{border:none;background:none;cursor:pointer;color:var(--g30);padding:4px}
.spsec{padding:14px 16px}
.spsec h3{font-size:10px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--g60);margin-bottom:8px}
.sprow{display:flex;align-items:center;padding:11px 0;
  border-bottom:1px solid var(--g20);gap:12px}
.sprow:last-child{border-bottom:none}
.splbl{flex:1;font-size:14px;color:var(--g90)}
.spsub{font-size:11px;color:var(--g60);margin-top:2px}
.spdiv{height:1px;background:var(--g20);margin:0 16px}
.tog{position:relative;width:40px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tt{position:absolute;inset:0;background:var(--g30);
  border-radius:11px;cursor:pointer;transition:background .2s}
.tog input:checked+.tt{background:var(--b50)}
.tt::after{content:"";position:absolute;top:3px;left:3px;
  width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.tog input:checked+.tt::after{transform:translateX(18px)}

/* YOU ARE HERE */
@keyframes pulse{0%,100%{opacity:1;r:6}50%{opacity:.4;r:10}}
</style>
</head>
<body>
<div id="app">

<header id="topbar">
  <div class="logo">
    <svg viewBox="0 0 40 16" fill="none">
      <rect y="0" width="40" height="2" fill="#1192e8"/>
      <rect y="3.5" width="40" height="2" fill="#1192e8"/>
      <rect x="6" y="7" width="28" height="2" fill="#1192e8"/>
      <rect x="6" y="10.5" width="28" height="2" fill="#1192e8"/>
      <rect y="14" width="40" height="2" fill="#1192e8"/>
    </svg>
    <span class="bname">One Madison <b>Wayfinder</b></span>
  </div>
  <div class="sp"></div>
  <button class="ib" id="settings-btn">
    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
      <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/>
    </svg>
  </button>
</header>

<div id="map-wrap">
  <div id="map-canvas">
    <canvas id="floor-canvas"></canvas>
    <svg id="route-svg" style="position:absolute;top:0;left:0;overflow:visible;pointer-events:none">
      <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6Z" fill="#0f62fe" opacity=".9"/></marker></defs>
    </svg>
    <div id="pin-layer"></div>
  </div>
</div>

<div id="sbar">
  <div class="sw">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#6f6f6f">
      <path d="M15.7 14.3l-4.2-4.2A6 6 0 1 0 10.3 11.5l4.2 4.2-1.4 1.3zM6 10.5a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9z"/>
    </svg>
    <input type="search" id="si" placeholder="Search rooms, amenities, floors…" autocomplete="off" autocorrect="off"/>
    <button id="sx" aria-label="Clear">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M12 4.7L11.3 4 8 7.3 4.7 4 4 4.7 7.3 8 4 11.3l.7.7L8 8.7l3.3 3.3.7-.7L8.7 8z"/>
      </svg>
    </button>
  </div>
  <div id="sres"></div>
</div>

<div id="rhdr">
  <div class="rf"><div class="rfd" style="background:#42be65"></div><span id="rfrom">Your location</span></div>
  <div class="rf"><div class="rfd" style="background:#fa4d56"></div><span id="rto">Destination</span></div>
  <button id="rx"><svg width="16" height="16" viewBox="0 0 16 16" fill="#6f6f6f"><path d="M12 4.7L11.3 4 8 7.3 4.7 4 4 4.7 7.3 8 4 11.3l.7.7L8 8.7l3.3 3.3.7-.7L8.7 8z"/></svg></button>
</div>

<div id="fpill"></div>

<div id="mctl">
  <button class="mb" id="zi">+</button>
  <button class="mb" id="zo">&#8722;</button>
  <button class="mb" id="zr">
    <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 12.5A5.5 5.5 0 1 1 8 2.5a5.5 5.5 0 0 1 0 11zM8 6a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
    </svg>
  </button>
</div>

<div id="bs">
  <div class="bsh" id="bsh"></div>
  <div id="bsb"></div>
</div>

<nav id="bnav">
  <button class="ni on" id="n-map">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="3,6 9,3 15,6 21,3 21,18 15,21 9,18 3,21"/>
      <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
    </svg>Map
  </button>
  <button class="ni" id="n-explore">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>Explore
  </button>
  <button class="ni" id="n-dir">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="3,11 22,2 13,21 11,13"/>
    </svg>Directions
  </button>
  <button class="ni" id="n-saved">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
    </svg>Saved
  </button>
</nav>

<div id="spanel">
  <div class="sphdr">
    <button class="spbk" id="spbk"><svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M10 3.5L5.5 8l4.5 4.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></button>
    <h2>Settings</h2>
  </div>
  <div class="spsec">
    <h3>Navigation</h3>
    <div class="sprow">
      <div><div class="splbl">Accessible routes</div><div class="spsub">Prefer elevators over stairs</div></div>
      <label class="tog"><input type="checkbox" id="ta"/><div class="tt"></div></label>
    </div>
    <div class="sprow">
      <div><div class="splbl">Show direction arrows on route</div></div>
      <label class="tog"><input type="checkbox" id="tarr" checked/><div class="tt"></div></label>
    </div>
  </div>
  <div class="spdiv"></div>
  <div class="spsec">
    <h3>About</h3>
    <div class="sprow"><div class="splbl">Building</div><span style="font-size:13px;color:#6f6f6f">IBM One Madison Ave, NYC</span></div>
    <div class="sprow"><div class="splbl">Floors</div><span style="font-size:13px;color:#6f6f6f;font-family:'IBM Plex Mono',monospace">1, 2, 8, 9, 10</span></div>
    <div class="sprow"><div class="splbl">Version</div><span style="font-size:13px;color:#6f6f6f;font-family:'IBM Plex Mono',monospace">2.1.0</span></div>
  </div>
</div>

<div id="toast"></div>

// ── STATE ─────────────────────────────────────────────
const S = {
  floor: 2,       // default = floor 8 (index 2)
  scale: 1, ox:0, oy:0,
  minS:0.2, maxS:4,
  origin:null, dest:null,
  routeMode:false, routeStep:null,
  saved:[], showArrows:true,
};

// ── CANVAS SETUP ──────────────────────────────────────
const mapWrap  = document.getElementById('map-wrap');
const mapCanvas = document.getElementById('map-canvas');
const canvas   = document.getElementById('floor-canvas');
const ctx      = canvas.getContext('2d');
const pinLayer = document.getElementById('pin-layer');
const routeSvg = document.getElementById('route-svg');

const SVG_W = 1224, SVG_H = 792;
// Scale SVG to a sensible canvas size
const SCALE = 0.8;
const CW = SVG_W * SCALE;  // 979
const CH = SVG_H * SCALE;  // 634

canvas.width  = CW;
canvas.height = CH;
canvas.style.width  = CW + 'px';
canvas.style.height = CH + 'px';
routeSvg.setAttribute('width',  CW);
routeSvg.setAttribute('height', CH);
pinLayer.style.width  = CW + 'px';
pinLayer.style.height = CH + 'px';

function sx(x){ return x * SCALE; }
function sy(y){ return y * SCALE; }

// ── DRAW FLOOR ────────────────────────────────────────
function drawFloor() {
  const fl = FLOORS[S.floor];
  const shape = FLOOR_SHAPES[fl.num];
  ctx.clearRect(0, 0, CW, CH);

  if (!shape) return;

  // Background
  ctx.fillStyle = '#f0f0f0';
  ctx.fillRect(0, 0, CW, CH);

  // Grid (subtle)
  ctx.strokeStyle = 'rgba(0,0,0,.04)';
  ctx.lineWidth = 1;
  for(let x=0;x<CW;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}

  // Floor fill
  ctx.beginPath();
  shape.outline.forEach(([x,y],i) => i===0 ? ctx.moveTo(sx(x),sy(y)) : ctx.lineTo(sx(x),sy(y)));
  ctx.closePath();
  ctx.fillStyle   = '#ffffff';
  ctx.strokeStyle = fl.color;
  ctx.lineWidth   = 3;
  ctx.fill();
  ctx.stroke();

  // Rooms
  if (shape.rooms) {
    shape.rooms.forEach(r => {
      // Room fill
      ctx.fillStyle = r.fill || '#f4f4f4';
      ctx.beginPath();
      ctx.roundRect(sx(r.x), sy(r.y), sx(r.w), sy(r.h), 3);
      ctx.fill();
      // Room border
      ctx.strokeStyle = 'rgba(0,0,0,.08)';
      ctx.lineWidth   = 1;
      ctx.stroke();
      // Room label
      const cw = sx(r.w), ch2 = sy(r.h);
      if(cw > 35 && ch2 > 20){
        ctx.fillStyle   = '#525252';
        ctx.font        = `${Math.min(9, cw/r.label.length * 1.4)}px "IBM Plex Sans",sans-serif`;
        ctx.textAlign   = 'center';
        ctx.textBaseline= 'middle';
        ctx.fillText(r.label, sx(r.x)+cw/2, sy(r.y)+ch2/2, cw-6);
      }
    });
  }

  // Compass rose
  drawCompass();

  // Floor label
  ctx.fillStyle = fl.color;
  ctx.font = 'bold 13px "IBM Plex Mono",monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('Floor ' + fl.label, 10, 8);

  // Scale bar
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(CW-80, CH-14);
  ctx.lineTo(CW-20, CH-14);
  ctx.stroke();
  ctx.fillStyle = '#888';
  ctx.font = '9px "IBM Plex Sans",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('~20m', CW-50, CH-6);
}

function drawCompass() {
  const cx=CW-20, cy=20, r=10;
  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.beginPath();ctx.arc(cx,cy,r+3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#161616';
  ctx.font='bold 8px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  // N arrow
  ctx.beginPath();
  ctx.moveTo(cx,cy-r);ctx.lineTo(cx-4,cy+3);ctx.lineTo(cx+4,cy+3);ctx.closePath();
  ctx.fillStyle='#161616';ctx.fill();
  ctx.fillStyle='#888';
  ctx.beginPath();
  ctx.moveTo(cx,cy+r);ctx.lineTo(cx-4,cy-3);ctx.lineTo(cx+4,cy-3);ctx.closePath();
  ctx.fill();
  ctx.fillStyle='#161616';
  ctx.font='bold 7px sans-serif';
  ctx.fillText('N',cx,cy-r-5);
}

// ── PINS ──────────────────────────────────────────────
function renderPins() {
  pinLayer.innerHTML = '';
  const fl = FLOORS[S.floor];
  const pois = (FLOOR_POIS[fl.num]||{pois:[]}).pois;

  pois.forEach(poi => {
    const t = TC[poi.type]||TC.room;
    const x = sx(poi.x), y = sy(poi.y);
    const pin = document.createElement('div');
    pin.style.cssText = `position:absolute;left:${x}px;top:${y}px;transform:translate(-50%,-100%);cursor:pointer;z-index:10;filter:drop-shadow(0 2px 3px rgba(0,0,0,.35))`;
    pin.dataset.pid = poi.id;
    pin.innerHTML = `<svg width="22" height="29" viewBox="0 0 28 36">
      <path d="M14 0C6.27 0 0 6.27 0 14c0 9.94 14 22 14 22S28 23.94 28 14C28 6.27 21.73 0 14 0z" fill="${t.c}"/>
      <circle cx="14" cy="14" r="7" fill="white" opacity=".9"/>
      <svg x="7" y="7" width="14" height="14" viewBox="0 0 16 16" fill="${t.c}">${t.i}</svg>
    </svg>`;
    pin.addEventListener('click', e => {
      e.stopPropagation();
      if (S.routeMode && S.routeStep) assignRoute(poi);
      else showPOI(poi);
    });
    // Tooltip on hover
    pin.title = poi.label.replace(/&amp;/g,'&');
    pinLayer.appendChild(pin);
  });

  // Origin / dest
  if (S.origin && S.origin.floorNum === fl.num) addNavPin(S.origin.x, S.origin.y, '#42be65');
  if (S.dest   && S.dest.floorNum   === fl.num) addNavPin(S.dest.x,   S.dest.y,   '#fa4d56');

  // You-are-here (demo: near elevator lobby)
  const yah = document.createElement('div');
  yah.style.cssText = `position:absolute;left:${sx(498)}px;top:${sy(300)}px;transform:translate(-50%,-50%);pointer-events:none;z-index:5`;
  yah.innerHTML = `<svg width="20" height="20" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="9" fill="#0f62fe" opacity=".15"/>
    <circle cx="10" cy="10" r="6" fill="#0f62fe" opacity=".25"/>
    <circle cx="10" cy="10" r="4" fill="#0f62fe"/>
    <circle cx="10" cy="10" r="2" fill="white"/>
  </svg>`;
  pinLayer.appendChild(yah);
}

function addNavPin(svgX, svgY, color) {
  const pin = document.createElement('div');
  pin.style.cssText = `position:absolute;left:${sx(svgX)}px;top:${sy(svgY)}px;transform:translate(-50%,-100%);pointer-events:none;z-index:15;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4))`;
  pin.innerHTML = `<svg width="26" height="34" viewBox="0 0 28 36">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 9.94 14 22 14 22S28 23.94 28 14C28 6.27 21.73 0 14 0z" fill="${color}"/>
    <circle cx="14" cy="14" r="5" fill="white"/>
  </svg>`;
  pinLayer.appendChild(pin);
}

// ── ROUTE ─────────────────────────────────────────────
function drawRoute() {
  routeSvg.querySelectorAll('.rp').forEach(e=>e.remove());
  if (!S.origin||!S.dest) return;
  // Only draw if same floor
  if (S.origin.floorNum !== FLOORS[S.floor].num || S.dest.floorNum !== FLOORS[S.floor].num) return;
  const ox=sx(S.origin.x), oy=sy(S.origin.y);
  const dx=sx(S.dest.x),   dy=sy(S.dest.y);
  const mx=dx, my=oy;
  const d=`M${ox},${oy} L${mx},${my} L${dx},${dy}`;
  const shadow=document.createElementNS('http://www.w3.org/2000/svg','path');
  shadow.setAttribute('d',d);shadow.setAttribute('class','rp');
  shadow.setAttribute('fill','none');shadow.setAttribute('stroke','rgba(0,0,0,.15)');
  shadow.setAttribute('stroke-width','9');shadow.setAttribute('stroke-linecap','round');
  routeSvg.appendChild(shadow);
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',d);path.setAttribute('class','rp');
  path.setAttribute('fill','none');path.setAttribute('stroke','#0f62fe');
  path.setAttribute('stroke-width','5');path.setAttribute('stroke-linecap','round');
  path.setAttribute('stroke-dasharray','12 5');
  if(S.showArrows) path.setAttribute('marker-end','url(#arr)');
  routeSvg.appendChild(path);
}

// ── PAN/ZOOM ──────────────────────────────────────────
function applyT(anim){
  if(anim){
    mapCanvas.style.transition='transform .25s cubic-bezier(.4,0,.2,1)';
    setTimeout(()=>mapCanvas.style.transition='',260);
  }
  mapCanvas.style.transform=`translate(${S.ox}px,${S.oy}px) scale(${S.scale})`;
}

function center(){
  const vw=mapWrap.clientWidth, vh=mapWrap.clientHeight;
  const fit=Math.min(vw/CW,vh/CH)*0.9;
  S.scale=Math.max(S.minS,Math.min(S.maxS,fit));
  S.ox=(vw-CW*S.scale)/2; S.oy=(vh-CH*S.scale)/2;
  applyT(true);
}

function zoomAt(cx,cy,f){
  const ns=Math.max(S.minS,Math.min(S.maxS,S.scale*f));
  const r=ns/S.scale;
  S.ox=cx-(cx-S.ox)*r; S.oy=cy-(cy-S.oy)*r; S.scale=ns; applyT(false);
}

// Touch
let tX=0,tY=0,td=false,pX=0,pY=0,pD=0,tapT=0;
mapWrap.addEventListener('touchstart',e=>{
  if(e.touches.length===1){tX=e.touches[0].clientX;tY=e.touches[0].clientY;td=true;tapT=Date.now();}
  else if(e.touches.length===2){
    pD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const r=mapWrap.getBoundingClientRect();
    pX=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
    pY=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
    td=false;
  }
},{passive:false});
mapWrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&td){
    S.ox+=e.touches[0].clientX-tX;S.oy+=e.touches[0].clientY-tY;
    tX=e.touches[0].clientX;tY=e.touches[0].clientY;applyT(false);
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zoomAt(pX,pY,d/pD);pD=d;
  }
},{passive:false});
mapWrap.addEventListener('touchend',e=>{
  if(e.touches.length===0){td=false;}
},{passive:true});

// Mouse
let md=false,mv=0;
mapWrap.addEventListener('mousedown',e=>{if(e.button!==0)return;md=true;mv=0;mapWrap.classList.add('grabbing');});
mapWrap.addEventListener('mousemove',e=>{if(!md)return;mv+=Math.abs(e.movementX)+Math.abs(e.movementY);S.ox+=e.movementX;S.oy+=e.movementY;applyT(false);});
mapWrap.addEventListener('mouseup',()=>{md=false;mapWrap.classList.remove('grabbing');});
mapWrap.addEventListener('mouseleave',()=>{md=false;mapWrap.classList.remove('grabbing');});
mapWrap.addEventListener('wheel',e=>{e.preventDefault();const r=mapWrap.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12);},{passive:false});
mapWrap.addEventListener('click',e=>{if(mv>5)return;if(!S.routeMode)hideBs();});

document.getElementById('zi').onclick=()=>{const c=mapWrap.clientWidth/2,v=mapWrap.clientHeight/2;zoomAt(c,v,1.35);};
document.getElementById('zo').onclick=()=>{const c=mapWrap.clientWidth/2,v=mapWrap.clientHeight/2;zoomAt(c,v,1/1.35);};
document.getElementById('zr').onclick=()=>center();

// ── FLOOR PILL ────────────────────────────────────────
function buildPill(){
  const fp=document.getElementById('fpill');
  fp.innerHTML='';
  [...FLOORS].reverse().forEach(fl=>{
    const i=FLOORS.findIndex(f=>f.num===fl.num);
    const b=document.createElement('button');
    b.className='fb'+(i===S.floor?' on':'');
    b.textContent=fl.label;
    b.title=fl.name;
    b.onclick=()=>switchFloor(i);
    fp.appendChild(b);
  });
}

function switchFloor(i){
  S.floor=i;buildPill();
  drawFloor();renderPins();drawRoute();
  showToast(FLOORS[i].name);hideBs();clearRoute();
}

// ── SEARCH ────────────────────────────────────────────
function allPOIs(){
  return FLOORS.flatMap((fl,fi)=>(FLOOR_POIS[fl.num]||{pois:[]}).pois.map(p=>({...p,fi,floorName:fl.name,floorLabel:fl.label,floorColor:fl.color})));
}
const si=document.getElementById('si'), sx2=document.getElementById('sx'), sres=document.getElementById('sres');
si.oninput=()=>{
  const q=si.value.trim().toLowerCase();
  sx2.classList.toggle('on',q.length>0);
  if(!q){sres.classList.remove('on');return;}
  const hits=allPOIs().filter(p=>p.label.toLowerCase().includes(q)||(p.desc||'').toLowerCase().includes(q));
  renderSR(hits,q);
};
si.onfocus=()=>{if(si.value.trim())sres.classList.add('on');};
document.addEventListener('click',e=>{if(!document.getElementById('sbar').contains(e.target))sres.classList.remove('on');});
sx2.onclick=()=>{si.value='';sx2.classList.remove('on');sres.classList.remove('on');si.focus();};

function renderSR(items,q){
  if(!items.length){sres.innerHTML=`<div class="sri"><div class="sn" style="color:#6f6f6f;flex:1">No results for "${q}"</div></div>`;sres.classList.add('on');return;}
  sres.innerHTML=items.slice(0,10).map(p=>{
    const t=TC[p.type]||TC.room;
    const lbl=(p.label||'').replace(/&amp;/g,'&');
    return `<div class="sri" data-pid="${p.id}" data-fi="${p.fi}">
      <div class="si" style="background:${t.c}18;color:${t.c}">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">${t.i}</svg>
      </div>
      <div style="flex:1">
        <div class="sn">${hl(lbl,q)}</div>
        <div class="ss">${p.desc||p.floorName}</div>
      </div>
      <span class="sf" style="background:${p.floorColor}18;color:${p.floorColor}">${p.floorLabel}</span>
    </div>`;
  }).join('');
  sres.classList.add('on');
  sres.querySelectorAll('.sri[data-pid]').forEach(el=>{
    el.onclick=()=>{
      const fi=parseInt(el.dataset.fi);
      const poi=(FLOOR_POIS[FLOORS[fi].num]||{pois:[]}).pois.find(p=>p.id===el.dataset.pid);
      if(!poi)return;
      sres.classList.remove('on');
      si.value=(poi.label||'').replace(/&amp;/g,'&');
      if(fi!==S.floor)switchFloor(fi);
      flyTo(poi.x,poi.y);
      showPOI(poi);
    };
  });
}

function hl(t,q){
  const i=t.toLowerCase().indexOf(q);
  if(i<0)return t;
  return t.slice(0,i)+`<strong style="color:#0f62fe">${t.slice(i,i+q.length)}</strong>`+t.slice(i+q.length);
}

// ── FLY TO ────────────────────────────────────────────
function flyTo(svgX,svgY,ts=2){
  const vw=mapWrap.clientWidth,vh=mapWrap.clientHeight;
  S.scale=Math.min(S.maxS,Math.max(S.minS,ts));
  S.ox=vw/2-sx(svgX)*S.scale;
  S.oy=vh/2-sy(svgY)*S.scale;
  applyT(true);
}

// ── POI SHEET ─────────────────────────────────────────
function showPOI(poi){
  const fl=FLOORS[S.floor];
  const t=TC[poi.type]||TC.room;
  const lbl=(poi.label||'').replace(/&amp;/g,'&');
  const saved=S.saved.some(s=>s.id===poi.id);
  document.getElementById('bsb').innerHTML=`
    <div class="bst">${lbl}</div>
    <div class="bss">
      <span class="bbg" style="background:${fl.color}18;color:${fl.color}">${fl.name}</span>
      <span class="bbg" style="background:${t.c}18;color:${t.c}">${poi.type}</span>
    </div>
    <div class="bacts">
      <button class="bbt p" id="bd">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3,11 22,2 13,21 11,13"/></svg>
        Directions
      </button>
      <button class="bbt s" id="bsv">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        ${saved?'Saved ✓':'Save'}
      </button>
    </div>
    <div class="brow">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="${t.c}">${t.i}</svg>
      <span>${poi.desc||fl.name}</span>
    </div>
    <div class="brow">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="#6f6f6f"><path d="M8 1C5.24 1 3 3.24 3 6c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 7.5A2.5 2.5 0 1 1 8 4a2.5 2.5 0 0 1 0 5z"/></svg>
      <span>IBM One Madison Ave, ${fl.name}</span>
    </div>`;
  document.getElementById('bd').onclick=()=>{hideBs();enterRoute(null,{poi,floorNum:fl.num});};
  document.getElementById('bsv').onclick=()=>{toggleSave(poi);showPOI(poi);};
  showBs('on');
}

function toggleSave(poi){
  const i=S.saved.findIndex(s=>s.id===poi.id);
  if(i>=0){S.saved.splice(i,1);showToast('Removed from saved');}
  else{S.saved.push(poi);showToast('Saved!');}
}

// ── ROUTE ─────────────────────────────────────────────
function enterRoute(org,destObj){
  S.routeMode=true;
  document.getElementById('sbar').style.display='none';
  document.getElementById('rhdr').classList.add('on');
  if(destObj){
    const lbl=(destObj.poi.label||'').replace(/&amp;/g,'&');
    S.dest={x:destObj.poi.x,y:destObj.poi.y,floorNum:destObj.floorNum,label:lbl};
    document.getElementById('rto').textContent=lbl;
    if(!S.origin){S.routeStep='origin';showToast('Tap your start point on the map');}
  }
  if(org){
    S.origin=org;
    document.getElementById('rfrom').textContent=org.label;
    S.routeStep=null;
    if(S.dest){drawRoute();showRouteSheet();}
  }
  renderPins();navOn('dir');
}

function exitRoute(){
  S.routeMode=false;S.routeStep=null;
  clearRoute();renderPins();
  document.getElementById('rhdr').classList.remove('on');
  document.getElementById('sbar').style.display='';
  document.getElementById('rfrom').textContent='Your location';
  document.getElementById('rto').textContent='Destination';
  S.origin=null;S.dest=null;
  navOn('map');hideBs();
}

function clearRoute(){S.origin=null;S.dest=null;routeSvg.querySelectorAll('.rp').forEach(e=>e.remove());}

function assignRoute(poi){
  const lbl=(poi.label||'').replace(/&amp;/g,'&');
  const fl=FLOORS[S.floor];
  if(S.routeStep==='origin'){
    S.origin={x:poi.x,y:poi.y,floorNum:fl.num,label:lbl};
    document.getElementById('rfrom').textContent=lbl;
    S.routeStep=S.dest?null:'dest';
    if(!S.dest)showToast('Now tap destination');
  } else if(S.routeStep==='dest'){
    S.dest={x:poi.x,y:poi.y,floorNum:fl.num,label:lbl};
    document.getElementById('rto').textContent=lbl;
    S.routeStep=null;
  }
  renderPins();
  if(S.origin&&S.dest){drawRoute();showRouteSheet();}
}

function showRouteSheet(){
  if(!S.origin||!S.dest)return;
  const sameFloor=S.origin.floorNum===S.dest.floorNum;
  const dx=S.dest.x-S.origin.x,dy=S.dest.y-S.origin.y;
  const dist=Math.round((Math.sqrt(dx*dx+dy*dy)+(sameFloor?0:150))*0.14);
  const mins=Math.max(1,Math.round(dist/85));
  const steps=sameFloor
    ?[`Walk toward ${S.dest.label}`,`Arrive at <strong>${S.dest.label}</strong>`]
    :[`Head to elevator on ${S.origin.floorNum==='1'?'Floor 1':S.origin.floorNum==='2'?'Floor 2':'Floor '+S.origin.floorNum}`,
      `Take elevator to Floor ${S.dest.floorNum}`,
      `Walk to <strong>${S.dest.label}</strong>`];
  document.getElementById('bsb').innerHTML=`
    <div class="bst">Route</div>
    <div class="bss"><span>${S.origin.label}</span><span style="margin:0 6px">→</span><span>${S.dest.label}</span></div>
    <div class="rsbox">
      <div><div class="rst">${mins} min</div><div class="rsd">${dist} m walk</div></div>
      <button class="bbt p" id="startnav" style="flex:0;padding:0 18px">Start</button>
    </div>
    ${steps.map((s,i)=>`<div class="step">
      <div class="stpi" style="${i===steps.length-1?'background:#fa4d5618;color:#fa4d56':''}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          ${i===steps.length-1?'<circle cx="12" cy="12" r="8"/>':'<polygon points="3,11 22,2 13,21 11,13"/>'}
        </svg>
      </div><span>${s}</span>
    </div>`).join('')}`;
  document.getElementById('startnav').onclick=()=>showToast('Follow the blue path');
  showBs('pk');
}

document.getElementById('rx').onclick=exitRoute;

// ── EXPLORE ───────────────────────────────────────────
function openExplore(){
  const groups={};
  allPOIs().filter(p=>p.type!=='room').forEach(p=>{
    if(!groups[p.type])groups[p.type]=[];
    groups[p.type].push(p);
  });
  let h=`<div class="bst">Explore</div><div class="bss">All locations — tap to navigate</div>`;
  Object.keys(groups).sort().forEach(t=>{
    const tc=TC[t]||TC.room;
    h+=`<div style="margin-bottom:10px">
      <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:${tc.c};margin:10px 0 6px">${t}</div>
      ${groups[t].slice(0,6).map(p=>{
        const lbl=(p.label||'').replace(/&amp;/g,'&');
        return `<div class="sri" data-eid="${p.id}" data-fi="${p.fi}" style="padding:9px 0;border-bottom:1px solid #e0e0e0">
          <div class="si" style="background:${tc.c}18;color:${tc.c}">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">${tc.i}</svg>
          </div>
          <div style="flex:1"><div class="sn">${lbl}</div><div class="ss">${p.floorName}</div></div>
          <span class="sf" style="background:${p.floorColor}18;color:${p.floorColor}">${p.floorLabel}</span>
        </div>`;
      }).join('')}
    </div>`;
  });
  document.getElementById('bsb').innerHTML=h;
  document.getElementById('bsb').querySelectorAll('.sri[data-eid]').forEach(el=>{
    el.onclick=()=>{
      const fi=parseInt(el.dataset.fi);
      const poi=(FLOOR_POIS[FLOORS[fi].num]||{pois:[]}).pois.find(p=>p.id===el.dataset.eid);
      if(!poi)return;
      if(fi!==S.floor)switchFloor(fi);
      flyTo(poi.x,poi.y);showPOI(poi);
    };
  });
  showBs('on');
}

// ── SAVED ─────────────────────────────────────────────
function openSaved(){
  if(!S.saved.length){
    document.getElementById('bsb').innerHTML=`<div class="bst">Saved Places</div>
      <div style="padding:24px 0;text-align:center;color:#6f6f6f;font-size:13px">Tap the bookmark icon on any location to save it here.</div>`;
  } else {
    document.getElementById('bsb').innerHTML=`<div class="bst">Saved (${S.saved.length})</div>
      ${S.saved.map((p,i)=>{const t=TC[p.type]||TC.room;const lbl=(p.label||'').replace(/&amp;/g,'&');return`<div class="sri" data-si="${i}" style="padding:10px 0;border-bottom:1px solid #e0e0e0">
        <div class="si" style="background:${t.c}18;color:${t.c}"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">${t.i}</svg></div>
        <div style="flex:1"><div class="sn">${lbl}</div><div class="ss">${p.desc||''}</div></div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0f62fe" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </div>`;}).join('')}`;
    document.getElementById('bsb').querySelectorAll('.sri[data-si]').forEach(el=>{
      el.onclick=()=>{const p=S.saved[parseInt(el.dataset.si)];showPOI(p);};
    });
  }
  showBs('on');
}

// ── NAV / BS / TOAST ──────────────────────────────────
function navOn(id){document.querySelectorAll('.ni').forEach(b=>b.classList.remove('on'));document.getElementById('n-'+id).classList.add('on');}
function showBs(c){document.getElementById('bs').classList.remove('on','pk');document.getElementById('bs').classList.add(c);}
function hideBs(){document.getElementById('bs').classList.remove('on','pk');}
document.getElementById('bsh').onclick=hideBs;
document.getElementById('n-map').onclick=()=>{navOn('map');hideBs();};
document.getElementById('n-explore').onclick=()=>{navOn('explore');openExplore();};
document.getElementById('n-dir').onclick=()=>{navOn('dir');enterRoute();};
document.getElementById('n-saved').onclick=()=>{navOn('saved');openSaved();};

let toastT;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2400);}

// Settings
document.getElementById('settings-btn').onclick=()=>document.getElementById('spanel').classList.add('on');
document.getElementById('spbk').onclick=()=>document.getElementById('spanel').classList.remove('on');
document.getElementById('tarr').onchange=e=>{S.showArrows=e.target.checked;drawRoute();};

// ── BOOT ──────────────────────────────────────────────
buildPill();
drawFloor();
renderPins();
center();
showToast('IBM One Madison — Floors 1, 2, 8, 9, 10');
</script>
</body>
