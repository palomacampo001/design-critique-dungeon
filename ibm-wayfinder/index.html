<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>IBM One Madison Wayfinder</title>
<style>
/* System fonts only — zero network requests */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --b:#0f62fe;--bh:#0043ce;--bl:#edf5ff;
  --g0:#161616;--g1:#262626;--g2:#393939;--g3:#525252;
  --g4:#6f6f6f;--g5:#c6c6c6;--g6:#e0e0e0;--g7:#f4f4f4;
  --wh:#fff;--grn:#42be65;--red:#fa4d56;
  --fnt:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  --top:52px;--bot:64px;
}
html,body{height:100%;width:100%;overflow:hidden;
  font-family:var(--fnt);font-size:14px;color:var(--g0);background:#1a1f2e}
#app{position:relative;width:100%;height:100dvh;overflow:hidden}

/* TOP BAR */
#tb{position:absolute;top:0;left:0;right:0;height:var(--top);
  background:var(--g0);display:flex;align-items:center;
  padding:0 16px;gap:10px;z-index:200}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-bars{display:flex;flex-direction:column;gap:2px;width:28px}
.logo-bars span{display:block;height:2px;background:#1192e8}
.logo-bars span:nth-child(3),.logo-bars span:nth-child(4){width:72%}
.bname{font-size:13px;font-weight:500;color:#fff;white-space:nowrap}
.bname em{color:#4589ff;font-style:normal}
.sp{flex:1}
.ib{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;border-radius:4px;color:var(--g5)}
.ib:active{background:var(--g2)}

/* MAP CANVAS */
#mw{position:absolute;top:var(--top);bottom:var(--bot);
  left:0;right:0;overflow:hidden;touch-action:none;cursor:grab;background:#1a1f2e}
#mw.gr{cursor:grabbing}
#mc{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#mc canvas{display:block}
#pl{position:absolute;top:0;left:0;pointer-events:none}

/* SEARCH */
#sb{position:absolute;top:calc(var(--top) + 12px);left:12px;right:12px;z-index:300}
.sw{background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.3);
  display:flex;align-items:center;padding:0 12px;height:48px;gap:8px;
  border:2px solid transparent;transition:border-color .15s}
.sw:focus-within{border-color:var(--b)}
.sw input{flex:1;border:none;outline:none;font:15px var(--fnt);
  color:var(--g0);background:transparent}
.sw input::placeholder{color:var(--g4)}
.sx{border:none;background:none;cursor:pointer;color:var(--g4);
  width:28px;height:28px;display:none;align-items:center;justify-content:center}
.sx.v{display:flex}
#sr{background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.25);
  margin-top:6px;display:none;max-height:260px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#sr.v{display:block}
.si{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer;
  border-bottom:1px solid var(--g6)}
.si:last-child{border-bottom:none}
.si:active{background:var(--bl)}
.sic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;flex-shrink:0}
.sn{font-size:13px;font-weight:500;color:var(--g0)}
.sd{font-size:11px;color:var(--g4);margin-top:1px}
.sf{font-size:10px;font-weight:600;padding:2px 6px;border-radius:12px;flex-shrink:0;
  font-family:var(--mono)}

/* ROUTE HEADER */
#rh{position:absolute;top:var(--top);left:0;right:0;background:#fff;
  z-index:300;padding:10px 44px 10px 12px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);display:none;flex-direction:column;gap:7px}
#rh.v{display:flex}
.rf{display:flex;align-items:center;gap:8px;background:var(--g7);
  border-radius:4px;padding:8px 12px;font-size:13px;color:var(--g2)}
.rfd{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rf span{flex:1}
#rx{position:absolute;top:10px;right:10px;border:none;background:none;
  cursor:pointer;color:var(--g4);padding:6px}

/* FLOOR PILL */
#fp{position:absolute;right:12px;bottom:calc(var(--bot)+16px);z-index:150;
  background:#fff;border-radius:24px;box-shadow:0 4px 16px rgba(0,0,0,.2);
  overflow:hidden;border:1px solid var(--g6)}
.fb{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;
  font-family:var(--mono);font-size:13px;font-weight:600;color:var(--g3);
  border-bottom:1px solid var(--g6)}
.fb:last-child{border-bottom:none}
.fb.a{background:var(--b);color:#fff}

/* MAP CONTROLS — left side, bottom */
#mc2{position:absolute;left:12px;bottom:calc(var(--bot)+16px);z-index:150;
  background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.2);
  overflow:hidden;border:1px solid var(--g6)}
.mb{width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;color:var(--g3);font-size:20px;
  border-bottom:1px solid var(--g6);user-select:none}
.mb:last-child{border-bottom:none}
.mb:active{background:var(--g7)}

/* BOTTOM SHEET */
#bs{position:absolute;bottom:var(--bot);left:0;right:0;background:#fff;
  border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.2);z-index:400;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:60vh;display:flex;flex-direction:column;overflow:hidden}
#bs.on{transform:translateY(0)}
#bs.pk{transform:translateY(calc(100% - 130px))}
.bh{width:36px;height:4px;background:var(--g5);border-radius:2px;
  margin:10px auto 0;flex-shrink:0;cursor:pointer}
#bb{padding:16px 20px 24px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.bt{font-size:18px;font-weight:600;margin-bottom:4px}
.bs2{font-size:12px;color:var(--g4);margin-bottom:14px;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:12px}
.ba{display:flex;gap:8px;margin-bottom:14px}
.bb2{flex:1;height:40px;border:none;border-radius:4px;
  font:500 13px var(--fnt);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px}
.bb2.p{background:var(--b);color:#fff}
.bb2.p:active{background:var(--bh)}
.bb2.s{background:var(--g7);color:var(--g2);border:1px solid var(--g6)}
.bb2.s:active{background:var(--g6)}
.br{display:flex;align-items:flex-start;gap:10px;padding:10px 0;
  border-top:1px solid var(--g6);font-size:13px;color:var(--g3)}
.rbox{background:var(--bl);border-radius:8px;padding:12px 14px;
  margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.rt{font-size:22px;font-weight:600;color:var(--bh)}
.rd{font-size:12px;color:var(--g3);margin-top:2px}
.stp{display:flex;align-items:center;gap:10px;padding:9px 0;
  border-top:1px solid var(--g6);font-size:13px;color:var(--g2)}
.stpi{width:26px;height:26px;border-radius:50%;background:var(--g7);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* BOTTOM NAV */
#bn{position:absolute;bottom:0;left:0;right:0;height:var(--bot);
  background:var(--g0);display:flex;align-items:center;z-index:200;
  padding-bottom:env(safe-area-inset-bottom,0px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;height:100%;
  border:none;background:none;cursor:pointer;color:var(--g4);
  font-size:10px;font-family:var(--fnt);transition:color .15s}
.ni.a{color:#4589ff}
.ni svg{width:22px;height:22px}

/* TOAST */
#t{position:absolute;bottom:calc(var(--bot)+14px);left:50%;
  transform:translateX(-50%) translateY(50px);
  background:var(--g1);color:#fff;padding:9px 18px;
  border-radius:8px;font-size:13px;white-space:nowrap;z-index:600;
  transition:transform .25s,opacity .25s;pointer-events:none;opacity:0}
#t.on{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>

const W=700,H=480; // canvas size in CSS px — small enough for any phone
const S=W/1224;    // scale from SVG coords to canvas coords

function px(x){return x*S;}
function py(y){return y*S;}

// Draw a rounded rectangle without roundRect API (iOS 15 compat)
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawFloor(){
  const f=FL[fi], sh=SHAPES[f.n];
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle='#e8eef4';
  ctx.fillRect(0,0,W,H);

  if(!sh) return;

  // Floor fill
  ctx.beginPath();
  sh.walls.forEach(([x,y],i)=>i===0?ctx.moveTo(px(x),py(y)):ctx.lineTo(px(x),py(y)));
  ctx.closePath();
  ctx.fillStyle='#ffffff';
  ctx.fill();
  ctx.strokeStyle=f.c;
  ctx.lineWidth=2.5;
  ctx.stroke();

  // Zones
  sh.zones.forEach(z=>{
    rrect(px(z.x),py(z.y),px(z.w),py(z.h),3);
    ctx.fillStyle=z.f||'#f4f4f4';
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.07)';
    ctx.lineWidth=1;
    ctx.stroke();
    // Label
    const cw=px(z.w),ch=py(z.h);
    if(cw>28&&ch>16){
      const fs=Math.min(9,Math.max(6,cw/(z.l.length*0.7)));
      ctx.fillStyle='#525252';
      ctx.font=fs+'px -apple-system,sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(z.l,px(z.x)+cw/2,py(z.y)+ch/2,cw-4);
    }
  });

  // Floor label
  ctx.font='bold 11px -apple-system,monospace';
  ctx.fillStyle=f.c;
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText(f.name,8,6);

  // Scale bar
  ctx.strokeStyle='rgba(0,0,0,.3)';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W-64,H-12);ctx.lineTo(W-16,H-12);ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.font='8px sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText('~20m',W-40,H-2);
}

// ── PINS ─────────────────────────────────────────────
function renderPins(){
  pl.innerHTML='';
  const f=FL[fi];
  const pois=(FP[f.n]||{pois:[]}).pois;

  pois.forEach(p=>{
    const ic=IC[p.type]||IC.room;
    const x=px(p.x),y=py(p.y);
    const d=document.createElement('div');
    d.style.cssText=`position:absolute;left:${x}px;top:${y}px;transform:translate(-50%,-100%);cursor:pointer;z-index:5`;
    d.dataset.id=p.id;
    d.innerHTML=`<svg width="20" height="26" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.27 0 0 6.27 0 14c0 9.94 14 22 14 22S28 23.94 28 14C28 6.27 21.73 0 14 0z" fill="${ic.c}"/><circle cx="14" cy="14" r="7" fill="white" opacity=".9"/><svg x="7" y="7" width="14" height="14" viewBox="0 0 16 16" fill="${ic.c}">${ic.p}</svg></svg>`;
    d.addEventListener('click',e=>{e.stopPropagation();if(rmode&&rstep)assignRoute(p);else showPOI(p);},{passive:true});
    pl.appendChild(d);
  });

  // Nav pins
  if(org&&org.fn===f.n) addNavPin(org.x,org.y,'#42be65');
  if(dst&&dst.fn===f.n) addNavPin(dst.x,dst.y,'#fa4d56');

  // You-are-here dot
  const yah=document.createElement('div');
  yah.style.cssText=`position:absolute;left:${px(498)}px;top:${py(310)}px;transform:translate(-50%,-50%);pointer-events:none;z-index:4`;
  yah.innerHTML=`<svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="8" fill="#0f62fe" opacity=".18"/><circle cx="9" cy="9" r="5" fill="#0f62fe" opacity=".35"/><circle cx="9" cy="9" r="3" fill="#0f62fe"/><circle cx="9" cy="9" r="1.5" fill="white"/></svg>`;
  pl.appendChild(yah);
}

function addNavPin(svgX,svgY,color){
  const d=document.createElement('div');
  d.style.cssText=`position:absolute;left:${px(svgX)}px;top:${py(svgY)}px;transform:translate(-50%,-100%);pointer-events:none;z-index:10`;
  d.innerHTML=`<svg width="24" height="32" viewBox="0 0 28 36"><path d="M14 0C6.27 0 0 6.27 0 14c0 9.94 14 22 14 22S28 23.94 28 14C28 6.27 21.73 0 14 0z" fill="${color}"/><circle cx="14" cy="14" r="5" fill="white"/></svg>`;
  pl.appendChild(d);
}

// ── ROUTE SVG ────────────────────────────────────────
function drawRoute(){
  rv.querySelectorAll('.rp').forEach(e=>e.remove());
  if(!org||!dst||org.fn!==FL[fi].n||dst.fn!==FL[fi].n) return;
  const ox2=px(org.x),oy2=py(org.y),dx=px(dst.x),dy2=py(dst.y);
  const d=`M${ox2},${oy2}L${dx},${oy2}L${dx},${dy2}`;
  const mk=(s,w,c,dash,marker)=>{
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',d);p.setAttribute('class','rp');p.setAttribute('fill','none');
    p.setAttribute('stroke',c);p.setAttribute('stroke-width',w);
    p.setAttribute('stroke-linecap','round');
    if(dash)p.setAttribute('stroke-dasharray',dash);
    if(marker)p.setAttribute('marker-end',marker);
    rv.appendChild(p);
  };
  mk(null,'8','rgba(0,0,0,.15)');
  mk(null,'4','#0f62fe','10 4','url(#ar)');
}

// ── PAN/ZOOM ─────────────────────────────────────────
function applyT(a){
  if(a){mcEl.style.transition='transform .25s cubic-bezier(.4,0,.2,1)';setTimeout(()=>mcEl.style.transition='',260);}
  mcEl.style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;
}
function center(a=true){
  const vw=mw.clientWidth,vh=mw.clientHeight;
  const fit=Math.min(vw/W,vh/H)*0.88;
  sc=Math.max(.2,Math.min(4,fit));
  ox=(vw-W*sc)/2; oy=(vh-H*sc)/2;
  applyT(a);
}
function zAt(cx,cy,f){
  const ns=Math.max(.2,Math.min(4,sc*f)),r=ns/sc;
  ox=cx-(cx-ox)*r; oy=cy-(cy-oy)*r; sc=ns; applyT(false);
}

// Touch
let tx=0,ty=0,td=false,pd=0,px2=0,py2=0,mv=0;
mw.addEventListener('touchstart',e=>{
  if(e.touches.length===1){tx=e.touches[0].clientX;ty=e.touches[0].clientY;td=true;mv=0;}
  else if(e.touches.length===2){
    pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const r=mw.getBoundingClientRect();
    px2=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
    py2=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
    td=false;
  }
},{passive:false});
mw.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&td){
    const dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;
    mv+=Math.abs(dx)+Math.abs(dy);
    ox+=dx;oy+=dy;tx=e.touches[0].clientX;ty=e.touches[0].clientY;applyT(false);
  }else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zAt(px2,py2,d/pd);pd=d;
  }
},{passive:false});
mw.addEventListener('touchend',()=>{td=false;},{passive:true});

// Mouse
let md=false,mm=0;
mw.addEventListener('mousedown',e=>{if(e.button!==0)return;md=true;mm=0;mw.classList.add('gr');});
mw.addEventListener('mousemove',e=>{if(!md)return;mm+=Math.abs(e.movementX)+Math.abs(e.movementY);ox+=e.movementX;oy+=e.movementY;applyT(false);});
mw.addEventListener('mouseup',()=>{md=false;mw.classList.remove('gr');});
mw.addEventListener('mouseleave',()=>{md=false;mw.classList.remove('gr');});
mw.addEventListener('wheel',e=>{e.preventDefault();const r=mw.getBoundingClientRect();zAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12);},{passive:false});
mw.addEventListener('click',e=>{if(mm>6)return;if(!rmode)hideBs();});
document.getElementById('zi').onclick=()=>zAt(mw.clientWidth/2,mw.clientHeight/2,1.35);
document.getElementById('zo').onclick=()=>zAt(mw.clientWidth/2,mw.clientHeight/2,1/1.35);
document.getElementById('zr').onclick=()=>center();

// ── FLOOR PILL ───────────────────────────────────────
function buildPill(){
  const fp=document.getElementById('fp');
  fp.innerHTML='';
  [...FL].reverse().forEach(f=>{
    const i=FL.findIndex(x=>x.n===f.n);
    const b=document.createElement('button');
    b.className='fb'+(i===fi?' a':'');
    b.textContent=f.n;
    b.title=f.name;
    b.onclick=()=>switchFloor(i);
    fp.appendChild(b);
  });
}
function switchFloor(i){
  fi=i;buildPill();drawFloor();renderPins();drawRoute();showToast(FL[i].name);hideBs();
  org=null;dst=null;
}

// ── SEARCH ───────────────────────────────────────────
function allP(){return FL.flatMap((f,i)=>(FP[f.n]||{pois:[]}).pois.map(p=>({...p,fi:i,fn:f.name,fc:f.c,fl:f.n})));}
const sinp=document.getElementById('si'),sxb=document.getElementById('sx'),srEl=document.getElementById('sr');
sinp.oninput=()=>{
  const q=sinp.value.trim().toLowerCase();
  sxb.classList.toggle('v',q.length>0);
  if(!q){srEl.classList.remove('v');return;}
  const hits=allP().filter(p=>p.label.toLowerCase().includes(q)||(p.desc||'').toLowerCase().includes(q));
  renderSR(hits,q);
};
sinp.onfocus=()=>{if(sinp.value.trim())srEl.classList.add('v');};
document.addEventListener('click',e=>{if(!document.getElementById('sb').contains(e.target))srEl.classList.remove('v');});
sxb.onclick=()=>{sinp.value='';sxb.classList.remove('v');srEl.classList.remove('v');sinp.focus();};

function renderSR(items,q){
  if(!items.length){srEl.innerHTML=`<div class="si"><span class="sn" style="color:#6f6f6f">No results for "${q}"</span></div>`;srEl.classList.add('v');return;}
  srEl.innerHTML=items.slice(0,8).map(p=>{
    const ic=IC[p.type]||IC.room;
    const lbl=(p.label||'').replace(/&amp;/g,'&');
    return `<div class="si" data-id="${p.id}" data-fi="${p.fi}">
      <div class="sic" style="background:${ic.c}18;color:${ic.c}"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">${ic.p}</svg></div>
      <div style="flex:1"><div class="sn">${hl(lbl,q)}</div><div class="sd">${p.fn}</div></div>
      <span class="sf" style="background:${p.fc}18;color:${p.fc}">${p.fl}</span>
    </div>`;
  }).join('');
  srEl.classList.add('v');
  srEl.querySelectorAll('.si[data-id]').forEach(el=>{
    el.onclick=()=>{
      const i=parseInt(el.dataset.fi);
      const poi=(FP[FL[i].n]||{pois:[]}).pois.find(p=>p.id===el.dataset.id);
      if(!poi)return;
      srEl.classList.remove('v');sinp.value=(poi.label||'').replace(/&amp;/g,'&');
      if(i!==fi)switchFloor(i);
      flyTo(poi.x,poi.y);showPOI(poi);
    };
  });
}
function hl(t,q){const i=t.toLowerCase().indexOf(q);if(i<0)return t;return t.slice(0,i)+`<b style="color:#0f62fe">${t.slice(i,i+q.length)}</b>`+t.slice(i+q.length);}

// ── FLY TO ───────────────────────────────────────────
function flyTo(svgX,svgY,ts=2.2){
  const vw=mw.clientWidth,vh=mw.clientHeight;
  sc=Math.min(4,Math.max(.2,ts));
  ox=vw/2-px(svgX)*sc;oy=vh/2-py(svgY)*sc;applyT(true);
}

// ── POI SHEET ────────────────────────────────────────
function showPOI(poi){
  const f=FL[fi],ic=IC[poi.type]||IC.room;
  const lbl=(poi.label||'').replace(/&amp;/g,'&');
  const sv=saved.some(s=>s.id===poi.id);
  document.getElementById('bb').innerHTML=`
    <div class="bt">${lbl}</div>
    <div class="bs2">
      <span class="bg" style="background:${f.c}18;color:${f.c}">${f.name}</span>
      <span class="bg" style="background:${ic.c}18;color:${ic.c}">${poi.type}</span>
    </div>
    <div class="ba">
      <button class="bb2 p" id="bdir"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3,11 22,2 13,21 11,13"/></svg>Directions</button>
      <button class="bb2 s" id="bsav"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>${sv?'Saved ✓':'Save'}</button>
    </div>
    <div class="br"><svg width="14" height="14" viewBox="0 0 16 16" fill="${ic.c}">${ic.p}</svg><span>${poi.desc||f.name}</span></div>
    <div class="br"><svg width="14" height="14" viewBox="0 0 16 16" fill="#6f6f6f"><path d="M8 1C5.24 1 3 3.24 3 6c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 7.5A2.5 2.5 0 1 1 8 4a2.5 2.5 0 0 1 0 5z"/></svg><span>IBM One Madison, ${f.name}</span></div>`;
  document.getElementById('bdir').onclick=()=>{hideBs();enterRoute(poi);};
  document.getElementById('bsav').onclick=()=>{toggleSave(poi);showPOI(poi);};
  showBs('on');
}
function toggleSave(poi){const i=saved.findIndex(s=>s.id===poi.id);if(i>=0){saved.splice(i,1);toast('Removed');}else{saved.push(poi);toast('Saved!');}}

// ── ROUTING ──────────────────────────────────────────
function enterRoute(destPoi){
  rmode=true;
  document.getElementById('sb').style.display='none';
  document.getElementById('rh').classList.add('v');
  if(destPoi){
    const lbl=(destPoi.label||'').replace(/&amp;/g,'&');
    dst={x:destPoi.x,y:destPoi.y,fn:FL[fi].n,label:lbl};
    document.getElementById('rfb').textContent=lbl;
    rstep='org';toast('Tap your starting point');
  }
  renderPins();navOn(2);
}
function exitRoute(){
  rmode=false;rstep=null;org=null;dst=null;
  rv.querySelectorAll('.rp').forEach(e=>e.remove());
  renderPins();
  document.getElementById('rh').classList.remove('v');
  document.getElementById('sb').style.display='';
  document.getElementById('rfa').textContent='Your location';
  document.getElementById('rfb').textContent='Destination';
  navOn(0);hideBs();
}
function assignRoute(poi){
  const lbl=(poi.label||'').replace(/&amp;/g,'&');
  const fn=FL[fi].n;
  if(rstep==='org'){org={x:poi.x,y:poi.y,fn,label:lbl};document.getElementById('rfa').textContent=lbl;rstep=dst?null:'dst';if(!dst)toast('Now tap destination');}
  else{dst={x:poi.x,y:poi.y,fn,label:lbl};document.getElementById('rfb').textContent=lbl;rstep=null;}
  renderPins();drawRoute();
  if(org&&dst)showRouteSheet();
}
function showRouteSheet(){
  const sf=org.fn===dst.fn;
  const d=Math.round((Math.hypot(dst.x-org.x,dst.y-org.y)+(sf?0:120))*0.14);
  const m=Math.max(1,Math.round(d/85));
  const steps=sf?[`Walk toward ${dst.label}`,`Arrive at <b>${dst.label}</b>`]:
    [`Head to elevator on Floor ${org.fn}`,`Take elevator to Floor ${dst.fn}`,`Walk to <b>${dst.label}</b>`];
  document.getElementById('bb').innerHTML=`
    <div class="bt">Route</div>
    <div class="bs2"><span>${org.label}</span><span style="margin:0 5px">&#8594;</span><span>${dst.label}</span></div>
    <div class="rbox"><div><div class="rt">${m} min</div><div class="rd">${d} m walk</div></div>
      <button class="bb2 p" id="gon" style="flex:0;padding:0 16px">Start</button></div>
    ${steps.map((s,i)=>`<div class="stp">
      <div class="stpi" style="${i===steps.length-1?'background:#fa4d5620;color:#fa4d56':'color:#0f62fe'}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          ${i===steps.length-1?'<circle cx="12" cy="12" r="8"/>':'<polygon points="3,11 22,2 13,21 11,13"/>'}
        </svg></div><span>${s}</span></div>`).join('')}`;
  document.getElementById('gon').onclick=()=>toast('Follow the blue path');
  showBs('pk');
}
document.getElementById('rx').onclick=exitRoute;

// ── EXPLORE ──────────────────────────────────────────
function openExplore(){
  const groups={};
  allP().filter(p=>p.type!=='room').forEach(p=>{if(!groups[p.type])groups[p.type]=[];groups[p.type].push(p);});
  let h=`<div class="bt">Explore</div><div class="bs2">Tap any location to navigate</div>`;
  Object.keys(groups).sort().forEach(t=>{
    const ic=IC[t]||IC.room;
    h+=`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:${ic.c};margin:10px 0 5px">${t}</div>
    ${groups[t].slice(0,5).map(p=>{
      const lbl=(p.label||'').replace(/&amp;/g,'&');
      return `<div class="si" data-eid="${p.id}" data-fi="${p.fi}" style="padding:9px 0;border-bottom:1px solid #e0e0e0">
        <div class="sic" style="background:${ic.c}18;color:${ic.c}"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">${ic.p}</svg></div>
        <div style="flex:1"><div class="sn">${lbl}</div><div class="sd">${p.fn}</div></div>
        <span class="sf" style="background:${p.fc}18;color:${p.fc}">${p.fl}</span>
      </div>`;}).join('')}</div>`;
  });
  document.getElementById('bb').innerHTML=h;
  document.getElementById('bb').querySelectorAll('[data-eid]').forEach(el=>{
    el.onclick=()=>{const i=parseInt(el.dataset.fi);const poi=(FP[FL[i].n]||{pois:[]}).pois.find(p=>p.id===el.dataset.eid);if(!poi)return;if(i!==fi)switchFloor(i);flyTo(poi.x,poi.y);showPOI(poi);};
  });
  showBs('on');
}

// ── SAVED ────────────────────────────────────────────
function openSaved(){
  document.getElementById('bb').innerHTML=!saved.length
    ?`<div class="bt">Saved Places</div><p style="padding:20px 0;text-align:center;color:#6f6f6f;font-size:13px">Tap bookmark on any location to save it.</p>`
    :`<div class="bt">Saved (${saved.length})</div>${saved.map((p,i)=>{const ic=IC[p.type]||IC.room;const lbl=(p.label||'').replace(/&amp;/g,'&');return`<div class="si" data-si="${i}" style="padding:10px 0;border-bottom:1px solid #e0e0e0"><div class="sic" style="background:${ic.c}18;color:${ic.c}"><svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">${ic.p}</svg></div><div style="flex:1"><div class="sn">${lbl}</div><div class="sd">${p.desc||''}</div></div></div>`;}).join('')}`;
  document.getElementById('bb').querySelectorAll('[data-si]').forEach(el=>{
    el.onclick=()=>showPOI(saved[parseInt(el.dataset.si)]);
  });
  showBs('on');
}

// ── UI HELPERS ───────────────────────────────────────
function navOn(i){document.querySelectorAll('.ni').forEach((b,j)=>b.classList.toggle('a',j===i));}
function showBs(c){const b=document.getElementById('bs');b.classList.remove('on','pk');b.classList.add(c);}
function hideBs(){document.getElementById('bs').classList.remove('on','pk');}
document.getElementById('bh').onclick=hideBs;
document.getElementById('n0').onclick=()=>{navOn(0);hideBs();};
document.getElementById('n1').onclick=()=>{navOn(1);openExplore();};
document.getElementById('n2').onclick=()=>{navOn(2);enterRoute(null);};
document.getElementById('n3').onclick=()=>{navOn(3);openSaved();};

let tt;
function toast(m){const el=document.getElementById('t');el.textContent=m;el.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('on'),2400);}

document.getElementById('stbtn').onclick=()=>toast('Settings coming soon');

// ── BOOT ─────────────────────────────────────────────
buildPill();
drawFloor();
renderPins();
center(false);
</script>
</body>
</html>
